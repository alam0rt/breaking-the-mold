name: SLES_010.90
sha1: 5a14b65cb44813bfed1ee53c6a3f4456bc230f97
options:
  basename: game
  target_path: disks/pal/SLES_010.90
  elf_path: build/pal/game.elf
  base_path: ..
  platform: psx
  compiler: PSYQ
  migrate_rodata_to_functions: false

  asm_path: asm/pal
  src_path: src
  build_path: build/pal
  # create_asm_dependencies: True

  ld_script_path: build/pal/game.ld
  ld_dependencies: true

  find_file_boundaries: true
  gp_value: 0x800A5954
  # ld_gp_expression: main_SCOMMON_START + 0x7FF0

  o_as_suffix: true
  use_legacy_include_asm: false

  section_order: [".rodata", ".text", ".data", ".sdata", ".bss"]
  auto_link_sections: [".data", ".rodata", ".sdata", ".bss"]

  # Disable section alignment to match original binary layout
  ld_align_section_vram_end: false
  ld_align_segment_vram_end: false

  symbol_addrs_path:
  - symbol_addrs.txt
  reloc_addrs_path:
  - reloc_addrs.txt

  undefined_funcs_auto_path: undefined_funcs_auto.txt
  undefined_syms_auto_path: undefined_syms_auto.txt

  extensions_path: tools/splat_ext

  subalign: 2

  string_encoding: ASCII
  data_string_encoding: ASCII
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2

  # Uncomment this line if you need to use the maspsx reorder workaround hack
  # https://github.com/mkst/maspsx?tab=readme-ov-file#include_asm-reordering-workaround-hack
  # include_asm_macro_style: maspsx_hack
segments:
- name: header
  type: header
  start: 0x0

- name: main
  type: code
  start: 0x800
  vram: 0x80010000
  bss_size: 0x8278
  subsegments:
      # .rdata: 0x80010000 - 0x800131EF (size: 0x31F0)
  - [0x800, rodata]
  - [0xE2C, rodata, entity_lists]
  - [0x1F28, rodata, fmv_callbacks]
  - [0x2044, rodata, fmv_jumptables]
  - [0x2940, rodata, spu_audio]
  - [0x34F4, rodata, debug_menu]
  - [0x3970, rodata, heap_init]
      # .text: 0x800131F0 - 0x800907CF (size: 0x7D5E0)
  - [0x39F0, asm]
  - [0x80FEC, data]
      # .sdata: 0x800A5954 - 0x800A611F (size: 0x7CC)
  - [0x96154, sdata]
      # Padding to end of file (zeros) - placed after sdata using linker_section_order
  - [0x96920, pad]
- [0x97000]    # End of file (actual size)
