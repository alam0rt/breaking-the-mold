id: no-void-pointer-params
language: C
severity: hint
message: Prefer concrete pointer parameter types over void* when the pointee layout is known.
note: "For entity callbacks, use Entity*, SpriteEntity*, GameState*, or a subsystem-specific struct instead of void*."
rule:
  all:
    - kind: parameter_declaration
    - has:
        field: type
        kind: primitive_type
        regex: '^void$'
    - has:
        field: declarator
        kind: pointer_declarator
