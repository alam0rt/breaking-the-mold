<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skullmonkeys BLB Viewer</title>
<style>
/* ============================================================================
   Windows 2000 Classic Theme
   ============================================================================ */

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --win-bg: #d4d0c8;
  --win-bg-dark: #808080;
  --win-bg-light: #ffffff;
  --win-border-dark: #404040;
  --win-border-light: #ffffff;
  --win-title-active: #0a246a;
  --win-title-inactive: #808080;
  --win-title-text: #ffffff;
  --win-button-face: #d4d0c8;
  --win-highlight: #0a246a;
  --win-highlight-text: #ffffff;
  --win-text: #000000;
  --win-input-bg: #ffffff;
  --win-scrollbar: #d4d0c8;
  --font-system: Tahoma, "MS Sans Serif", Arial, sans-serif;
}

html, body {
  height: 100%;
  font-family: var(--font-system);
  font-size: 11px;
  background: var(--win-bg);
  color: var(--win-text);
  overflow: hidden;
}

/* 3D Border Utilities */
.border-raised {
  border: 2px solid;
  border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
}

.border-sunken {
  border: 2px solid;
  border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
}

.border-etched {
  border: 2px solid;
  border-color: var(--win-bg-dark) var(--win-bg-light) var(--win-bg-light) var(--win-bg-dark);
  box-shadow: inset 1px 1px 0 var(--win-bg-light), inset -1px -1px 0 var(--win-bg-dark);
}

/* ============================================================================
   Layout
   ============================================================================ */

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 4px;
  gap: 4px;
}

/* Title Bar */
#titlebar {
  display: flex;
  align-items: center;
  padding: 2px 4px;
  background: linear-gradient(to right, var(--win-title-active), #a6caf0);
  color: var(--win-title-text);
  font-weight: bold;
  font-size: 11px;
}

#titlebar .icon {
  width: 16px;
  height: 16px;
  margin-right: 4px;
  background: #fff;
  border-radius: 2px;
}

/* Toolbar */
#toolbar {
  display: flex;
  align-items: center;
  padding: 4px 6px;
  gap: 12px;
  background: var(--win-bg);
}

.toolbar-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.toolbar-group label {
  white-space: nowrap;
}

/* Buttons */
button, .btn {
  font-family: var(--font-system);
  font-size: 11px;
  padding: 3px 12px;
  background: var(--win-button-face);
  border: 2px solid;
  border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
  cursor: pointer;
  outline: none;
}

button:active, .btn:active {
  border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
  padding: 4px 11px 2px 13px;
}

button:focus, .btn:focus {
  outline: 1px dotted var(--win-text);
  outline-offset: -4px;
}

button:disabled {
  color: var(--win-bg-dark);
  text-shadow: 1px 1px 0 var(--win-bg-light);
}

/* Input/Select */
input[type="range"] {
  width: 150px;
}

select {
  font-family: var(--font-system);
  font-size: 11px;
  padding: 2px;
  background: var(--win-input-bg);
  border: 2px solid;
  border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
}

/* Win2K Fieldset/Legend */
fieldset.win-group {
  border: 1px solid var(--win-bg-dark);
  margin: 0;
  padding: 4px 6px 6px 6px;
  background: var(--win-bg);
}

fieldset.win-group legend {
  font-size: 11px;
  padding: 0 4px;
  color: var(--win-text);
  display: flex;
  align-items: center;
  gap: 4px;
}

fieldset.win-group legend input[type="checkbox"] {
  margin: 0;
}

.options-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-left: 4px;
}

.options-row label {
  display: flex;
  align-items: center;
  gap: 3px;
  white-space: nowrap;
  font-size: 11px;
}

.sub-option {
  margin-left: 16px;
}

/* Options Panel (below toolbar) */
#options-panel {
  display: flex;
  align-items: flex-start;
  padding: 4px 6px;
  gap: 12px;
  background: var(--win-bg);
  border-bottom: 1px solid var(--win-border-dark);
  flex-wrap: wrap;
}

/* Minimap */
#minimap-container {
  position: absolute;
  bottom: 8px;
  right: 8px;
  background: #000;
  border: 2px solid;
  border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
  padding: 2px;
  display: none;
}

#minimap-container.visible {
  display: block;
}

#minimap-inner {
  position: relative;
}

#minimap-header {
  background: linear-gradient(to right, var(--win-title-active), #a6caf0);
  color: var(--win-title-text);
  font-size: 9px;
  font-weight: bold;
  padding: 1px 4px;
  text-align: center;
}

#minimap-canvas {
  display: block;
  image-rendering: pixelated;
}

#minimap-viewport {
  position: absolute;
  border: 1px solid #ff0;
  pointer-events: none;
}

/* Main Content Area */
#main {
  display: flex;
  flex: 1;
  min-height: 0;
  gap: 4px;
}

/* Tree Panel */
#tree-panel {
  width: 280px;
  display: flex;
  flex-direction: column;
  background: var(--win-input-bg);
  border: 2px solid;
  border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
}

#tree-header {
  padding: 4px 6px;
  background: var(--win-bg);
  border-bottom: 1px solid var(--win-border-dark);
  font-weight: bold;
}

#tree-container {
  flex: 1;
  overflow: auto;
  padding: 4px;
}

/* Tree View */
.tree-node {
  user-select: none;
}

.tree-node-content {
  display: flex;
  align-items: center;
  padding: 2px 4px;
  cursor: pointer;
  white-space: nowrap;
}

.tree-node-content:hover {
  background: #e8e8e8;
}

.tree-node-content.selected {
  background: var(--win-highlight);
  color: var(--win-highlight-text);
}

.tree-toggle {
  width: 16px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: monospace;
  font-size: 10px;
  color: var(--win-text);
}

.tree-icon {
  width: 16px;
  height: 16px;
  margin-right: 4px;
  font-size: 12px;
}

.tree-children {
  margin-left: 16px;
}

.tree-children.collapsed {
  display: none;
}

/* Render Panel */
#render-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--win-bg);
  border: 2px solid;
  border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
}

#render-header {
  padding: 4px 6px;
  background: var(--win-bg);
  border-bottom: 1px solid var(--win-border-dark);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

#render-container {
  flex: 1;
  overflow: auto;
  background: #1a1a2e;
  position: relative;
}

#render-canvas {
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

/* Status Bar */
#statusbar {
  display: flex;
  align-items: center;
  padding: 2px 4px;
  background: var(--win-bg);
  border-top: 1px solid var(--win-bg-light);
  gap: 4px;
}

.status-section {
  padding: 2px 6px;
  background: var(--win-input-bg);
  border: 1px solid;
  border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
  flex: 1;
}

.status-section:first-child {
  flex: 3;
}

/* Loading Overlay */
#loading {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

#loading.visible {
  display: flex;
}

#loading-content {
  background: var(--win-bg);
  padding: 20px 40px;
  border: 2px solid;
  border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
  text-align: center;
}

/* Checkbox for layer visibility */
input[type="checkbox"] {
  margin-right: 4px;
}

/* Info panel in render area */
#info-panel {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(0,0,0,0.8);
  color: #0f0;
  padding: 8px 12px;
  font-family: monospace;
  font-size: 10px;
  border-radius: 4px;
  max-width: 300px;
  display: none;
}

#info-panel.visible {
  display: block;
}

/* Console Panel - Windows 2000 Theme */
#console-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 200px;
  background: var(--win-bg);
  border: 2px solid;
  border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
  display: none;
  flex-direction: column;
  font-family: "Fixedsys", "Lucida Console", "Courier New", monospace;
  font-size: 11px;
  z-index: 999;
}

#console-panel.visible {
  display: flex;
}

#console-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 2px 4px;
  background: linear-gradient(to right, var(--win-title-active), #a6caf0);
  color: var(--win-title-text);
  font-weight: bold;
}

#console-header-title {
  font-weight: bold;
}

#console-header-actions {
  display: flex;
  gap: 4px;
}

#console-header-actions button {
  padding: 1px 6px;
  font-size: 10px;
  font-family: var(--font-system);
  background: var(--win-button-face);
  color: var(--win-text);
  border: 2px solid;
  border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
  cursor: pointer;
}

#console-header-actions button:hover {
  background: #e0dcd4;
}

#console-header-actions button:active {
  border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
}

#console-content {
  flex: 1;
  overflow-y: auto;
  padding: 4px;
  background: var(--win-input-bg);
  color: var(--win-text);
  border: 2px solid;
  border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
  margin: 4px;
}

.console-entry {
  padding: 1px 0;
  border-bottom: 1px solid #e0e0e0;
  display: flex;
  gap: 8px;
}

.console-entry:last-child {
  border-bottom: none;
}

.console-time {
  color: #808080;
  flex-shrink: 0;
}

.console-msg {
  word-break: break-word;
  white-space: pre-wrap;
}

.console-entry.log .console-msg {
  color: var(--win-text);
}

.console-entry.info .console-msg {
  color: #0000aa;
}

.console-entry.warn .console-msg {
  color: #aa5500;
}

.console-entry.error .console-msg {
  color: #aa0000;
  font-weight: bold;
}

.console-entry.error {
  background: #ffeeee;
}
</style>
</head>
<body>

<div id="app">
  <!-- Title Bar -->
  <div id="titlebar" class="border-raised">
    <span class="icon">🎮</span>
    <span>Skullmonkeys BLB Stage Viewer</span>
  </div>

  <!-- Toolbar -->
  <div id="toolbar" class="border-raised">
    <div class="toolbar-group">
      <button id="btn-open">📂 Open BLB...</button>
      <input type="file" id="file-input" accept=".blb,.BLB" style="display: none;">
    </div>
    <div class="toolbar-group">
      <label>Zoom:</label>
      <select id="zoom-level" disabled>
        <option value="1">1×</option>
        <option value="2" selected>2×</option>
        <option value="3">3×</option>
        <option value="4">4×</option>
      </select>
    </div>
    <div class="toolbar-group">
      <label>Camera X:</label>
      <input type="range" id="camera-x" min="0" max="1000" value="0" disabled style="width: 100px;">
      <span id="camera-x-val">0</span>
    </div>
    <div class="toolbar-group">
      <button id="btn-console">📋 Console</button>
    </div>
  </div>

  <!-- Options Panel -->
  <div id="options-panel">
    <!-- Display Options -->
    <fieldset class="win-group">
      <legend>Display</legend>
      <div class="options-row">
        <label><input type="checkbox" id="show-entities" checked disabled> Entities</label>
        <label><input type="checkbox" id="show-grid" disabled> Grid</label>
        <label><input type="checkbox" id="show-minimap" disabled> Minimap</label>
      </div>
    </fieldset>

    <!-- 90s Mode Group -->
    <fieldset class="win-group">
      <legend><input type="checkbox" id="mode-90s" disabled> 90s Mode</legend>
      <div class="options-row">
        <label><input type="checkbox" id="opt-static-bg" disabled> Static Background</label>
        <label><input type="checkbox" id="opt-mouse-follow" disabled> Mouse Follow</label>
        <label class="sub-option">
          Sensitivity:
          <input type="range" id="sensitivity" min="0.1" max="2" step="0.1" value="1" disabled style="width: 60px;">
          <span id="sensitivity-val">1.0×</span>
        </label>
      </div>
    </fieldset>
  </div>

  <!-- Main Content -->
  <div id="main">
    <!-- Tree Panel -->
    <div id="tree-panel">
      <div id="tree-header">📁 BLB Contents</div>
      <div id="tree-container">
        <div id="tree-placeholder" style="color: #808080; padding: 20px; text-align: center;">
          Open a BLB file to view contents
        </div>
      </div>
    </div>

    <!-- Render Panel -->
    <div id="render-panel">
      <div id="render-header">
        <span id="render-title">No stage selected</span>
        <span id="render-size"></span>
      </div>
      <div id="render-container">
        <canvas id="render-canvas"></canvas>
        <div id="info-panel"></div>
        <!-- Minimap -->
        <div id="minimap-container">
          <div id="minimap-header">MAP</div>
          <div id="minimap-inner">
            <canvas id="minimap-canvas" width="160" height="80"></canvas>
            <div id="minimap-viewport"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div id="statusbar">
    <div class="status-section" id="status-msg">Ready</div>
    <div class="status-section" id="status-file">No file loaded</div>
    <div class="status-section" id="status-size">-</div>
  </div>
</div>

<!-- Loading Overlay -->
<div id="loading">
  <div id="loading-content">
    <div>Loading...</div>
    <div id="loading-progress"></div>
  </div>
</div>

<!-- Console Panel -->
<div id="console-panel">
  <div id="console-header">
    <span id="console-header-title">📋 Console</span>
    <div id="console-header-actions">
      <button id="btn-console-clear">Clear</button>
      <button id="btn-console-close">✕</button>
    </div>
  </div>
  <div id="console-content"></div>
</div>

<script>
// ============================================================================
// Constants
// ============================================================================

const SECTOR_SIZE = 2048;
const HEADER_SIZE = 4096;
const LEVEL_ENTRY_SIZE = 0x70; // 112 bytes
const MAX_LEVELS = 26;

// Asset type IDs
const ASSET = {
  TILE_HEADER: 100,       // 0x064
  TILEMAP: 200,           // 0x0C8
  LAYER_ENTRIES: 201,     // 0x0C9
  TILE_PIXELS: 300,       // 0x12C
  PALETTE_IDX: 301,       // 0x12D
  TILE_FLAGS: 302,        // 0x12E
  PALETTE: 400,           // 0x190
  SPRITES: 600,           // 0x258
  COLLISION: 601,         // 0x259
};

// ============================================================================
// State
// ============================================================================

let state = {
  file: null,
  fileData: null,
  levels: [],
  selectedLevel: null,
  selectedStage: null,
  selectedLayer: null,
  cameraX: 0,
  cameraY: 0,
  zoom: 2,
  showEntities: true,
  showGrid: false,
  showMinimap: false,
  // 90s mode options
  mode90s: false,
  staticBg: false,
  mouseFollow: false,
  sensitivity: 1.0,
  // Dimensions
  psxWidth: 320,
  psxHeight: 256, // PAL
  levelWidth: 0,
  levelHeight: 0,
  // Cached data
  cachedSegments: new Map(),
  cachedTiles: null,
  cachedPalettes: null,
};

// ============================================================================
// DOM References
// ============================================================================

const dom = {
  fileInput: document.getElementById('file-input'),
  btnOpen: document.getElementById('btn-open'),
  btnConsole: document.getElementById('btn-console'),
  cameraX: document.getElementById('camera-x'),
  cameraXVal: document.getElementById('camera-x-val'),
  zoomLevel: document.getElementById('zoom-level'),
  // Display options
  showEntities: document.getElementById('show-entities'),
  showGrid: document.getElementById('show-grid'),
  showMinimap: document.getElementById('show-minimap'),
  // 90s mode options
  mode90s: document.getElementById('mode-90s'),
  optStaticBg: document.getElementById('opt-static-bg'),
  optMouseFollow: document.getElementById('opt-mouse-follow'),
  sensitivity: document.getElementById('sensitivity'),
  sensitivityVal: document.getElementById('sensitivity-val'),
  // Panels
  treeContainer: document.getElementById('tree-container'),
  renderTitle: document.getElementById('render-title'),
  renderSize: document.getElementById('render-size'),
  renderContainer: document.getElementById('render-container'),
  canvas: document.getElementById('render-canvas'),
  infoPanel: document.getElementById('info-panel'),
  // Minimap
  minimapContainer: document.getElementById('minimap-container'),
  minimapCanvas: document.getElementById('minimap-canvas'),
  minimapViewport: document.getElementById('minimap-viewport'),
  // Status
  statusMsg: document.getElementById('status-msg'),
  statusFile: document.getElementById('status-file'),
  statusSize: document.getElementById('status-size'),
  loading: document.getElementById('loading'),
  loadingProgress: document.getElementById('loading-progress'),
  consolePanel: document.getElementById('console-panel'),
  consoleContent: document.getElementById('console-content'),
  btnConsoleClear: document.getElementById('btn-console-clear'),
  btnConsoleClose: document.getElementById('btn-console-close'),
};

const ctx = dom.canvas.getContext('2d');

// ============================================================================
// Console Logger
// ============================================================================

const consoleLogger = {
  entries: [],
  maxEntries: 500,
  
  formatTime() {
    const now = new Date();
    return `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}.${now.getMilliseconds().toString().padStart(3, '0')}`;
  },
  
  addEntry(type, args) {
    const msg = args.map(arg => {
      if (typeof arg === 'object') {
        try {
          return JSON.stringify(arg, null, 2);
        } catch {
          return String(arg);
        }
      }
      return String(arg);
    }).join(' ');
    
    this.entries.push({ type, time: this.formatTime(), msg });
    
    if (this.entries.length > this.maxEntries) {
      this.entries.shift();
    }
    
    this.render();
  },
  
  render() {
    dom.consoleContent.innerHTML = this.entries.map(e => 
      `<div class="console-entry ${e.type}"><span class="console-time">[${e.time}]</span><span class="console-msg">${this.escapeHtml(e.msg)}</span></div>`
    ).join('');
    dom.consoleContent.scrollTop = dom.consoleContent.scrollHeight;
  },
  
  escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  },
  
  clear() {
    this.entries = [];
    this.render();
  },
  
  toggle() {
    dom.consolePanel.classList.toggle('visible');
  },
  
  show() {
    dom.consolePanel.classList.add('visible');
  },
  
  hide() {
    dom.consolePanel.classList.remove('visible');
  }
};

// Intercept console methods
const originalConsole = {
  log: console.log.bind(console),
  info: console.info.bind(console),
  warn: console.warn.bind(console),
  error: console.error.bind(console),
};

console.log = (...args) => {
  originalConsole.log(...args);
  consoleLogger.addEntry('log', args);
};

console.info = (...args) => {
  originalConsole.info(...args);
  consoleLogger.addEntry('info', args);
};

console.warn = (...args) => {
  originalConsole.warn(...args);
  consoleLogger.addEntry('warn', args);
};

console.error = (...args) => {
  originalConsole.error(...args);
  consoleLogger.addEntry('error', args);
};

// Catch unhandled errors
window.addEventListener('error', (e) => {
  consoleLogger.addEntry('error', [`Uncaught Error: ${e.message} at ${e.filename}:${e.lineno}:${e.colno}`]);
  consoleLogger.show();
});

window.addEventListener('unhandledrejection', (e) => {
  consoleLogger.addEntry('error', [`Unhandled Promise Rejection: ${e.reason}`]);
  consoleLogger.show();
});

// ============================================================================
// Utilities
// ============================================================================

function setStatus(msg) {
  dom.statusMsg.textContent = msg;
}

function showLoading(show, msg = 'Loading...') {
  dom.loading.classList.toggle('visible', show);
  dom.loadingProgress.textContent = msg;
}

function formatSize(bytes) {
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
}

function readString(data, offset, length) {
  const bytes = new Uint8Array(data.buffer, data.byteOffset + offset, length);
  let str = '';
  for (let i = 0; i < length; i++) {
    if (bytes[i] === 0) break;
    str += String.fromCharCode(bytes[i]);
  }
  return str.trim();
}

// PSX 15-bit color to RGBA
function psxColorToRGBA(color16) {
  if (color16 === 0) return [0, 0, 0, 0]; // Transparent
  const r = (color16 & 0x1F) * 8;
  const g = ((color16 >> 5) & 0x1F) * 8;
  const b = ((color16 >> 10) & 0x1F) * 8;
  return [r, g, b, 255];
}

// ============================================================================
// BLB Header Parsing
// ============================================================================

function parseLevelEntry(data, index) {
  const offset = index * LEVEL_ENTRY_SIZE;
  const view = new DataView(data.buffer, data.byteOffset + offset, LEVEL_ENTRY_SIZE);
  
  const levelId = readString(data, offset + 0x56, 5);
  const levelName = readString(data, offset + 0x5B, 21);
  
  // Skip empty entries
  if (!levelId || levelId === '\x00\x00\x00\x00\x00') {
    return null;
  }
  
  const stageCount = view.getUint16(0x0E, true);
  
  // Read per-stage arrays
  const tertDataOff = [];
  const secSectorOff = [];
  const secSectorCnt = [];
  const tertSectorOff = [];
  const tertSectorCnt = [];
  
  for (let i = 0; i < 6; i++) {
    tertDataOff.push(view.getUint16(0x10 + i * 2, true));
    secSectorOff.push(view.getUint16(0x1E + i * 2, true));
    secSectorCnt.push(view.getUint16(0x2C + i * 2, true));
    tertSectorOff.push(view.getUint16(0x3A + i * 2, true));
    tertSectorCnt.push(view.getUint16(0x48 + i * 2, true));
  }
  
  return {
    index,
    sectorOffset: view.getUint16(0x00, true),
    sectorCount: view.getUint16(0x02, true),
    bufferSize: view.getUint32(0x04, true),
    entry1Offset: view.getUint32(0x08, true),
    levelIndex: view.getUint8(0x0C),
    selectable: view.getUint8(0x0D),
    stageCount,
    tertDataOff,
    secSectorOff,
    secSectorCnt,
    tertSectorOff,
    tertSectorCnt,
    levelId,
    levelName,
  };
}

function parseHeader(data) {
  const headerData = new Uint8Array(data, 0, HEADER_SIZE);
  const levels = [];
  
  for (let i = 0; i < MAX_LEVELS; i++) {
    const level = parseLevelEntry(headerData, i);
    if (level) {
      levels.push(level);
    }
  }
  
  return { levels };
}

// ============================================================================
// Segment Parsing
// ============================================================================

function readSegment(fileData, sectorOffset, sectorCount) {
  const offset = sectorOffset * SECTOR_SIZE;
  const size = sectorCount * SECTOR_SIZE;
  if (offset + size > fileData.byteLength) {
    console.warn(`Segment out of bounds: ${offset} + ${size} > ${fileData.byteLength}`);
    return null;
  }
  return new Uint8Array(fileData, offset, size);
}

function parseTOC(data) {
  if (!data || data.length < 4) return {};
  
  const view = new DataView(data.buffer, data.byteOffset);
  const count = view.getUint32(0, true);
  
  if (count > 1000) {
    console.warn('TOC count too large:', count);
    return {};
  }
  
  const assets = {};
  for (let i = 0; i < count; i++) {
    const entryOffset = 4 + i * 12;
    if (entryOffset + 12 > data.length) break;
    
    const assetType = view.getUint32(entryOffset, true);
    const size = view.getUint32(entryOffset + 4, true);
    const dataOffset = view.getUint32(entryOffset + 8, true);
    
    if (dataOffset + size <= data.length) {
      assets[assetType] = {
        offset: dataOffset,
        size,
        data: data.slice(dataOffset, dataOffset + size),
      };
    }
  }
  
  return assets;
}

function parseSubTOC(data) {
  if (!data || data.length < 4) return [];
  
  const view = new DataView(data.buffer, data.byteOffset);
  const count = view.getUint32(0, true);
  
  if (count > 10000) return [];
  
  const entries = [];
  for (let i = 0; i < count; i++) {
    const entryOffset = 4 + i * 12;
    if (entryOffset + 12 > data.length) break;
    
    const id = view.getUint32(entryOffset, true);
    const size = view.getUint32(entryOffset + 4, true);
    const dataOffset = view.getUint32(entryOffset + 8, true);
    
    if (dataOffset + size <= data.length) {
      entries.push({
        id,
        size,
        offset: dataOffset,
        data: data.slice(dataOffset, dataOffset + size),
      });
    }
  }
  
  return entries;
}

// ============================================================================
// Tile System
// ============================================================================

function parseTileHeader(data) {
  if (!data || data.length < 0x16) return null;
  
  const view = new DataView(data.buffer, data.byteOffset);
  return {
    bgR: data[0],
    bgG: data[1],
    bgB: data[2],
    altR: data[4],
    altG: data[5],
    altB: data[6],
    levelWidth: view.getUint16(0x08, true),
    levelHeight: view.getUint16(0x0A, true),
    spawnX: view.getUint16(0x0C, true),
    spawnY: view.getUint16(0x0E, true),
    count16x16: view.getUint16(0x10, true),
    count8x8: view.getUint16(0x12, true),
    countExtra: view.getUint16(0x14, true),
  };
}

function parsePalettes(paletteContainer) {
  const entries = parseSubTOC(paletteContainer);
  const palettes = [];
  
  for (const entry of entries) {
    const palette = [];
    const view = new DataView(entry.data.buffer, entry.data.byteOffset);
    
    for (let i = 0; i < 256 && i * 2 + 2 <= entry.data.length; i++) {
      const color16 = view.getUint16(i * 2, true);
      palette.push(psxColorToRGBA(color16));
    }
    
    palettes.push(palette);
  }
  
  return palettes;
}

function getTilePixels(tileIdx1Based, tileHeader, pixelData, flagsData, paletteIndices, palettes) {
  if (tileIdx1Based === 0) return null; // Transparent
  
  const idx0 = tileIdx1Based - 1;
  const totalTiles = tileHeader.count16x16 + tileHeader.count8x8 + tileHeader.countExtra;
  
  if (idx0 >= totalTiles) {
    // Entity marker
    return { isEntity: true, entityId: tileIdx1Based };
  }
  
  // Get tile flags
  // Bit 0: semi-transparent
  // Bit 1: tile size (0=16x16, 1=8x8) - note: documentation says "tile page mode (0=8x8, 1=16x16)" but actual flag is inverted
  // Bit 2: skip flag
  const flag = idx0 < flagsData.length ? flagsData[idx0] : 0;
  const isSemiTransparent = (flag & 0x01) !== 0;
  const is8x8 = (flag & 0x02) !== 0;  // Bit 1 set = 8x8 tile
  const isSkipped = (flag & 0x04) !== 0;
  
  if (isSkipped) return null;
  
  const tileSize = is8x8 ? 8 : 16;
  const stride = 16; // Always 16-byte stride
  const bytesPerTile = is8x8 ? 128 : 256;
  
  let offset;
  if (is8x8 && idx0 >= tileHeader.count16x16) {
    offset = tileHeader.count16x16 * 256 + (idx0 - tileHeader.count16x16) * 128;
  } else {
    offset = idx0 * 256;
  }
  
  if (offset + bytesPerTile > pixelData.length) return null;
  
  // Get palette
  const palIdx = idx0 < paletteIndices.length ? paletteIndices[idx0] : 0;
  const palette = palettes[palIdx] || palettes[0] || [];
  
  // Read pixel data
  const pixels = [];
  for (let y = 0; y < tileSize; y++) {
    const row = [];
    for (let x = 0; x < tileSize; x++) {
      const byteOffset = offset + y * stride + x;
      const colorIdx = byteOffset < pixelData.length ? pixelData[byteOffset] : 0;
      row.push(colorIdx);
    }
    pixels.push(row);
  }
  
  return {
    pixels,
    palette,
    size: tileSize,
    isSemiTransparent,
  };
}

// ============================================================================
// Layer Parsing
// ============================================================================

function parseLayerEntry(data, index) {
  const offset = index * 92;
  if (offset + 92 > data.length) return null;
  
  const view = new DataView(data.buffer, data.byteOffset + offset, 92);
  
  return {
    index,
    xOffset: view.getUint16(0x00, true),
    yOffset: view.getUint16(0x02, true),
    width: view.getUint16(0x04, true),
    height: view.getUint16(0x06, true),
    levelWidth: view.getUint16(0x08, true),
    levelHeight: view.getUint16(0x0A, true),
    renderParam: view.getUint32(0x0C, true),
    scrollX: view.getUint32(0x10, true),
    scrollY: view.getUint32(0x14, true),
    layerType: view.getUint8(0x26),
    skipRender: view.getUint16(0x28, true),
    bgR: view.getUint8(0x2C),
    bgG: view.getUint8(0x2D),
    bgB: view.getUint8(0x2E),
  };
}

function parseAllLayers(layerEntriesData) {
  const count = Math.floor(layerEntriesData.length / 92);
  const layers = [];
  
  for (let i = 0; i < count; i++) {
    const layer = parseLayerEntry(layerEntriesData, i);
    if (layer && layer.width > 0 && layer.height > 0) {
      layers.push(layer);
    }
  }
  
  return layers;
}

// ============================================================================
// Stage Loading
// ============================================================================

function loadStageData(level, stageIndex) {
  console.info(`🎮 Loading stage ${stageIndex} of ${level.levelId}...`);
  
  // Get tertiary segment
  const tertSectorOff = level.tertSectorOff[stageIndex];
  const tertSectorCnt = level.tertSectorCnt[stageIndex];
  const tertFileOff = tertSectorOff * SECTOR_SIZE;
  
  if (tertSectorCnt === 0) {
    console.warn(`Stage ${stageIndex} has no tertiary data`);
    return null;
  }
  
  console.log(`Tertiary: sector ${tertSectorOff}, count ${tertSectorCnt} (0x${tertFileOff.toString(16).toUpperCase()}, ${formatSize(tertSectorCnt * SECTOR_SIZE)})`);
  
  const tertiaryData = readSegment(state.fileData, tertSectorOff, tertSectorCnt);
  if (!tertiaryData) return null;
  
  // Determine which secondary to use
  // sec_sector_off[0] = base secondary, sec_sector_off[N] = sub-block for stage N
  // According to sector pairing: Stage N uses sec_sector_off[N]
  let secondaryData;
  let secSource;
  const secOff = level.secSectorOff[stageIndex];
  const secCnt = level.secSectorCnt[stageIndex];
  const secFileOff = secOff * SECTOR_SIZE;
  
  if (secCnt > 0) {
    secondaryData = readSegment(state.fileData, secOff, secCnt);
    secSource = `sec[${stageIndex}] sector ${secOff} (0x${secFileOff.toString(16).toUpperCase()}, ${formatSize(secCnt * SECTOR_SIZE)})`;
  } else {
    // Fall back to base secondary if this stage has no secondary
    const baseSecOff = level.secSectorOff[0];
    const baseSecCnt = level.secSectorCnt[0];
    secondaryData = readSegment(state.fileData, baseSecOff, baseSecCnt);
    secSource = `sec[0] fallback sector ${baseSecOff}`;
  }
  
  console.log(`Secondary: using ${secSource}`);
  
  if (!secondaryData) {
    console.warn(`Failed to load secondary data for stage ${stageIndex}`);
    return null;
  }
  
  // Parse TOCs
  const secTOC = parseTOC(secondaryData);
  const tertTOC = parseTOC(tertiaryData);
  
  // Log available assets
  const secAssets = Object.keys(secTOC).map(k => parseInt(k)).sort((a,b) => a-b);
  const tertAssets = Object.keys(tertTOC).map(k => parseInt(k)).sort((a,b) => a-b);
  console.log(`Secondary assets: [${secAssets.join(', ')}]`);
  console.log(`Tertiary assets: [${tertAssets.join(', ')}]`);
  
  // Parse tile data from secondary
  const tileHeader = secTOC[ASSET.TILE_HEADER] 
    ? parseTileHeader(secTOC[ASSET.TILE_HEADER].data) 
    : null;
  
  if (tileHeader) {
    const totalTiles = tileHeader.count16x16 + tileHeader.count8x8 + tileHeader.countExtra;
    console.log(`Tiles: ${totalTiles} total (${tileHeader.count16x16}×16×16, ${tileHeader.count8x8}×8×8)`);
    console.log(`Level size: ${tileHeader.levelWidth}×${tileHeader.levelHeight} tiles (${tileHeader.levelWidth * 16}×${tileHeader.levelHeight * 16} px)`);
    console.log(`BG color: rgb(${tileHeader.bgR}, ${tileHeader.bgG}, ${tileHeader.bgB})`);
  }
  
  const pixelData = secTOC[ASSET.TILE_PIXELS]?.data || new Uint8Array(0);
  const paletteIndices = secTOC[ASSET.PALETTE_IDX]?.data || new Uint8Array(0);
  const flagsData = secTOC[ASSET.TILE_FLAGS]?.data || new Uint8Array(0);
  const palettes = secTOC[ASSET.PALETTE] 
    ? parsePalettes(secTOC[ASSET.PALETTE].data) 
    : [];
  
  console.log(`Palettes: ${palettes.length}`);
  
  // Parse layer data from tertiary
  const layers = tertTOC[ASSET.LAYER_ENTRIES]
    ? parseAllLayers(tertTOC[ASSET.LAYER_ENTRIES].data)
    : [];
  
  // Log layer info
  console.log(`Layers: ${layers.length}`);
  for (const layer of layers) {
    const scrollXFactor = (layer.scrollX / 65536.0).toFixed(3);
    const scrollYFactor = (layer.scrollY / 65536.0).toFixed(3);
    console.log(`  [${layer.index}] ${layer.width}×${layer.height} tiles, scroll=(${scrollXFactor}, ${scrollYFactor}), type=${layer.layerType}${layer.skipRender ? ' [SKIP]' : ''}`);
  }
  
  // Parse tilemaps
  const tilemapContainer = tertTOC[ASSET.TILEMAP]?.data;
  const tilemaps = tilemapContainer ? parseSubTOC(tilemapContainer) : [];
  
  return {
    level,
    stageIndex,
    tileHeader,
    pixelData,
    paletteIndices,
    flagsData,
    palettes,
    layers,
    tilemaps,
  };
}

// ============================================================================
// Rendering
// ============================================================================

function renderStage(stageData) {
  if (!stageData || !stageData.tileHeader) {
    setStatus('No stage data to render');
    return;
  }
  
  const { tileHeader, pixelData, paletteIndices, flagsData, palettes, layers, tilemaps } = stageData;
  
  // Calculate full level size from layers
  let levelWidth = 0;
  let levelHeight = 0;
  
  for (const layer of layers) {
    const layerPixelWidth = layer.width * 16;
    const layerPixelHeight = layer.height * 16;
    levelWidth = Math.max(levelWidth, layerPixelWidth);
    levelHeight = Math.max(levelHeight, layerPixelHeight);
  }
  
  if (levelWidth === 0 || levelHeight === 0) {
    levelWidth = tileHeader.levelWidth * 16 || 320;
    levelHeight = tileHeader.levelHeight * 16 || 256;
  }
  
  // Determine render dimensions based on 90s mode
  const zoom = state.zoom;
  let viewWidth, viewHeight;
  
  if (state.mode90s) {
    viewWidth = state.psxWidth;
    viewHeight = state.psxHeight;
  } else {
    viewWidth = levelWidth;
    viewHeight = levelHeight;
  }
  
  // Set canvas size
  dom.canvas.width = viewWidth;
  dom.canvas.height = viewHeight;
  dom.canvas.style.width = `${viewWidth * zoom}px`;
  dom.canvas.style.height = `${viewHeight * zoom}px`;
  
  // Update camera slider range
  const maxCameraX = Math.max(0, levelWidth - state.psxWidth);
  dom.cameraX.max = maxCameraX;
  if (state.cameraX > maxCameraX) {
    state.cameraX = maxCameraX;
    dom.cameraX.value = maxCameraX;
    dom.cameraXVal.textContent = maxCameraX;
  }
  
  // Clear with background color
  ctx.fillStyle = `rgb(${tileHeader.bgR}, ${tileHeader.bgG}, ${tileHeader.bgB})`;
  ctx.fillRect(0, 0, viewWidth, viewHeight);
  
  // Create ImageData for pixel manipulation
  const imageData = ctx.createImageData(viewWidth, viewHeight);
  const data = imageData.data;
  
  // Pre-fill with background
  for (let i = 0; i < data.length; i += 4) {
    data[i] = tileHeader.bgR;
    data[i + 1] = tileHeader.bgG;
    data[i + 2] = tileHeader.bgB;
    data[i + 3] = 255;
  }
  
  // Entity markers list
  const entityMarkers = [];
  
  const totalTiles = tileHeader.count16x16 + tileHeader.count8x8 + tileHeader.countExtra;
  
  // Store level dimensions for reference
  state.levelWidth = levelWidth;
  state.levelHeight = levelHeight;
  
  // Render layers back-to-front
  for (let layerIdx = 0; layerIdx < layers.length; layerIdx++) {
    const layer = layers[layerIdx];
    
    // Skip non-renderable layers
    if (layer.layerType === 3) continue;
    if (layer.skipRender !== 0 && layer.layerType !== 3) continue;
    
    // Get tilemap for this layer
    const tilemap = tilemaps[layerIdx];
    if (!tilemap) continue;
    
    const tilemapData = tilemap.data;
    const tilemapView = new DataView(tilemapData.buffer, tilemapData.byteOffset);
    
    // Layer position offset (in pixels)
    const layerOffsetX = layer.xOffset * 16;
    const layerOffsetY = layer.yOffset * 16;
    
    // Parallax scroll factors (16.16 fixed point)
    // scrollFactor=0 means static background (doesn't move with camera)
    // scrollFactor=1 (0x10000) means moves with camera (foreground)
    const scrollFactorX = layer.scrollX / 65536.0;
    const scrollFactorY = layer.scrollY / 65536.0;
    
    // Render tiles
    for (let ty = 0; ty < layer.height; ty++) {
      for (let tx = 0; tx < layer.width; tx++) {
        const tileDataIdx = (ty * layer.width + tx) * 2;
        if (tileDataIdx + 2 > tilemapData.length) continue;
        
        const rawIdx = tilemapView.getUint16(tileDataIdx, true);
        const tileIdx = rawIdx & 0x7FF; // Lower 11 bits
        
        if (tileIdx === 0) continue;
        
        // Calculate world position (including layer offset)
        const worldX = layerOffsetX + tx * 16;
        const worldY = layerOffsetY + ty * 16;
        
        // Calculate screen position
        // Static background mode: layers with scrollFactor < 1 are rendered statically
        // Otherwise apply camera with parallax
        let screenX, screenY;
        if (state.mode90s) {
          // In 90s mode with static background, layer 0 (or low scroll factor) stays fixed
          if (state.staticBg && scrollFactorX < 0.5) {
            // Static background - no camera offset, tile to fill viewport
            screenX = worldX % viewWidth;
            if (screenX < 0) screenX += viewWidth;
            screenY = worldY;
          } else {
            // Normal parallax
            screenX = worldX - Math.floor(state.cameraX * scrollFactorX);
            screenY = worldY - Math.floor(state.cameraY * scrollFactorY);
          }
        } else {
          // In full view mode, just show everything at world position
          screenX = worldX;
          screenY = worldY;
        }
        
        // Skip tiles completely outside viewport
        if (screenX + 16 <= 0 || screenX >= viewWidth || screenY + 16 <= 0 || screenY >= viewHeight) {
          // Still collect entity markers even if off-screen
          if (tileIdx > totalTiles) {
            entityMarkers.push({
              x: screenX,
              y: screenY,
              entityId: tileIdx,
              layer: layerIdx,
            });
          }
          continue;
        }
        
        // Check if entity marker
        if (tileIdx > totalTiles) {
          entityMarkers.push({
            x: screenX,
            y: screenY,
            entityId: tileIdx,
            layer: layerIdx,
          });
          continue;
        }
        
        // Get tile pixels
        const tile = getTilePixels(
          tileIdx, tileHeader, pixelData, flagsData, paletteIndices, palettes
        );
        
        if (!tile || tile.isEntity) continue;
        
        const tileSize = tile.size;
        const scale = 16 / tileSize; // Scale 8x8 tiles to 16x16
        
        // Render tile pixels
        for (let py = 0; py < tileSize; py++) {
          for (let px = 0; px < tileSize; px++) {
            const colorIdx = tile.pixels[py][px];
            if (colorIdx === 0) continue; // Transparent
            
            const color = tile.palette[colorIdx] || [255, 0, 255, 255];
            const alpha = tile.isSemiTransparent ? 128 : color[3];
            
            // Apply scale and position
            for (let dy = 0; dy < scale; dy++) {
              for (let dx = 0; dx < scale; dx++) {
                const ix = screenX + px * scale + dx;
                const iy = screenY + py * scale + dy;
                
                if (ix < 0 || ix >= viewWidth || iy < 0 || iy >= viewHeight) continue;
                
                const pixelOffset = (iy * viewWidth + ix) * 4;
                
                if (alpha === 255) {
                  data[pixelOffset] = color[0];
                  data[pixelOffset + 1] = color[1];
                  data[pixelOffset + 2] = color[2];
                  data[pixelOffset + 3] = 255;
                } else if (alpha > 0) {
                  // Alpha blend
                  const a = alpha / 255;
                  data[pixelOffset] = Math.round(data[pixelOffset] * (1 - a) + color[0] * a);
                  data[pixelOffset + 1] = Math.round(data[pixelOffset + 1] * (1 - a) + color[1] * a);
                  data[pixelOffset + 2] = Math.round(data[pixelOffset + 2] * (1 - a) + color[2] * a);
                }
              }
            }
          }
        }
      }
    }
  }
  
  // Put image data to canvas
  ctx.putImageData(imageData, 0, 0);
  
  // Draw entity markers on top
  if (state.showEntities && entityMarkers.length > 0) {
    ctx.strokeStyle = '#ff0';
    ctx.lineWidth = 1;
    ctx.fillStyle = 'rgba(255, 255, 0, 0.3)';
    ctx.font = '8px monospace';
    
    for (const marker of entityMarkers) {
      ctx.fillRect(marker.x, marker.y, 16, 16);
      ctx.strokeRect(marker.x + 0.5, marker.y + 0.5, 15, 15);
      ctx.fillStyle = '#ff0';
      ctx.fillText(marker.entityId.toString(16), marker.x + 2, marker.y + 12);
      ctx.fillStyle = 'rgba(255, 255, 0, 0.3)';
    }
  }
  
  // Draw grid
  if (state.showGrid) {
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
    ctx.lineWidth = 1;
    
    for (let x = 0; x <= viewWidth; x += 16) {
      ctx.beginPath();
      ctx.moveTo(x + 0.5, 0);
      ctx.lineTo(x + 0.5, viewHeight);
      ctx.stroke();
    }
    
    for (let y = 0; y <= viewHeight; y += 16) {
      ctx.beginPath();
      ctx.moveTo(0, y + 0.5);
      ctx.lineTo(viewWidth, y + 0.5);
      ctx.stroke();
    }
  }
  
  // Update render info
  const sizeInfo = state.mode90s 
    ? `${viewWidth}×${viewHeight} (PSX) / Level: ${levelWidth}×${levelHeight}`
    : `${viewWidth}×${viewHeight}`;
  dom.renderSize.textContent = sizeInfo;
  
  // Update info panel
  dom.infoPanel.innerHTML = `
    Layers: ${layers.length}<br>
    Tiles: ${totalTiles} (${tileHeader.count16x16}×16 + ${tileHeader.count8x8}×8)<br>
    Palettes: ${palettes.length}<br>
    Entities: ${entityMarkers.length}${state.mode90s ? '<br>Camera: ' + state.cameraX + ',' + state.cameraY : ''}
  `;
  dom.infoPanel.classList.add('visible');
  
  // Update minimap if enabled
  if (state.showMinimap) {
    updateMinimap(stageData);
  }
}

// ============================================================================
// Minimap
// ============================================================================

const minimapCtx = dom.minimapCanvas.getContext('2d');
const MINIMAP_MAX_WIDTH = 160;
const MINIMAP_MAX_HEIGHT = 80;

function updateMinimap(stageData) {
  if (!stageData || !stageData.layers || stageData.layers.length === 0) return;
  
  const { layers, tilemaps, tileHeader } = stageData;
  const totalTiles = tileHeader.count16x16 + tileHeader.count8x8 + tileHeader.countExtra;
  
  // Calculate level bounds from all layers
  let levelWidth = 0;
  let levelHeight = 0;
  for (const layer of layers) {
    levelWidth = Math.max(levelWidth, layer.width);
    levelHeight = Math.max(levelHeight, layer.height);
  }
  
  if (levelWidth === 0 || levelHeight === 0) return;
  
  // Calculate scale to fit minimap
  const scaleX = MINIMAP_MAX_WIDTH / levelWidth;
  const scaleY = MINIMAP_MAX_HEIGHT / levelHeight;
  const scale = Math.min(scaleX, scaleY, 1); // Don't scale up
  
  const mapWidth = Math.ceil(levelWidth * scale);
  const mapHeight = Math.ceil(levelHeight * scale);
  
  // Resize canvas
  dom.minimapCanvas.width = mapWidth;
  dom.minimapCanvas.height = mapHeight;
  
  // Clear with dark background
  minimapCtx.fillStyle = '#1a1a2e';
  minimapCtx.fillRect(0, 0, mapWidth, mapHeight);
  
  // Draw each layer's tilemap as colored blocks
  const layerColors = ['#16213e', '#0f3460', '#1a1a40', '#4a4a6a'];
  
  for (let layerIdx = 0; layerIdx < layers.length; layerIdx++) {
    const layer = layers[layerIdx];
    const tilemap = tilemaps[layerIdx];
    if (!tilemap) continue;
    
    const tilemapData = tilemap.data;
    const tilemapView = new DataView(tilemapData.buffer, tilemapData.byteOffset);
    
    // Only draw foreground layers (high scroll factor)
    const scrollFactor = layer.scrollX / 65536.0;
    if (scrollFactor < 0.5) continue; // Skip background layers
    
    const color = layerColors[layerIdx % layerColors.length];
    
    for (let ty = 0; ty < layer.height; ty++) {
      for (let tx = 0; tx < layer.width; tx++) {
        const tileDataIdx = (ty * layer.width + tx) * 2;
        if (tileDataIdx + 2 > tilemapData.length) continue;
        
        const rawIdx = tilemapView.getUint16(tileDataIdx, true);
        const tileIdx = rawIdx & 0x7FF;
        
        if (tileIdx === 0) continue;
        
        const x = Math.floor((layer.xOffset + tx) * scale);
        const y = Math.floor((layer.yOffset + ty) * scale);
        const w = Math.max(1, Math.ceil(scale));
        const h = Math.max(1, Math.ceil(scale));
        
        // Entity markers in bright color
        if (tileIdx > totalTiles) {
          minimapCtx.fillStyle = '#e94560';
        } else {
          minimapCtx.fillStyle = color;
        }
        
        minimapCtx.fillRect(x, y, w, h);
      }
    }
  }
  
  // Draw entity markers on top
  minimapCtx.fillStyle = '#ffd700';
  for (let layerIdx = 0; layerIdx < layers.length; layerIdx++) {
    const layer = layers[layerIdx];
    const tilemap = tilemaps[layerIdx];
    if (!tilemap) continue;
    
    const tilemapData = tilemap.data;
    const tilemapView = new DataView(tilemapData.buffer, tilemapData.byteOffset);
    
    for (let ty = 0; ty < layer.height; ty++) {
      for (let tx = 0; tx < layer.width; tx++) {
        const tileDataIdx = (ty * layer.width + tx) * 2;
        if (tileDataIdx + 2 > tilemapData.length) continue;
        
        const rawIdx = tilemapView.getUint16(tileDataIdx, true);
        const tileIdx = rawIdx & 0x7FF;
        
        if (tileIdx > totalTiles) {
          const x = Math.floor((layer.xOffset + tx) * scale);
          const y = Math.floor((layer.yOffset + ty) * scale);
          minimapCtx.fillRect(x, y, 2, 2);
        }
      }
    }
  }
  
  // Update viewport indicator
  updateMinimapViewport();
}

function updateMinimapViewport() {
  if (!state.levelWidth || !state.levelHeight) return;
  
  const mapWidth = dom.minimapCanvas.width;
  const mapHeight = dom.minimapCanvas.height;
  
  // Calculate viewport size and position relative to minimap
  const scaleX = mapWidth / (state.levelWidth / 16);
  const scaleY = mapHeight / (state.levelHeight / 16);
  
  const vpWidth = Math.max(4, Math.floor((state.psxWidth / 16) * scaleX));
  const vpHeight = Math.max(4, Math.floor((state.psxHeight / 16) * scaleY));
  const vpX = Math.floor((state.cameraX / 16) * scaleX);
  const vpY = Math.floor((state.cameraY / 16) * scaleY);
  
  dom.minimapViewport.style.left = `${vpX}px`;
  dom.minimapViewport.style.top = `${vpY}px`;
  dom.minimapViewport.style.width = `${vpWidth}px`;
  dom.minimapViewport.style.height = `${vpHeight}px`;
}

// ============================================================================
// Tree View
// ============================================================================

function buildTreeView() {
  dom.treeContainer.innerHTML = '';
  
  if (state.levels.length === 0) {
    dom.treeContainer.innerHTML = '<div style="color: #808080; padding: 20px; text-align: center;">No levels found</div>';
    return;
  }
  
  const rootNode = createTreeNode({
    label: state.file.name,
    icon: '📁',
    expanded: true,
    children: state.levels.map(level => ({
      label: `${level.levelId} - ${level.levelName}`,
      icon: '📂',
      data: { type: 'level', level },
      expanded: false,
      children: Array.from({ length: level.stageCount }, (_, i) => ({
        label: `Stage ${i}`,
        icon: '🎮',
        data: { type: 'stage', level, stageIndex: i },
      })),
    })),
  });
  
  dom.treeContainer.appendChild(rootNode);
}

function createTreeNode({ label, icon, data, expanded = false, children = [] }) {
  const node = document.createElement('div');
  node.className = 'tree-node';
  
  const content = document.createElement('div');
  content.className = 'tree-node-content';
  
  // Toggle button
  const toggle = document.createElement('span');
  toggle.className = 'tree-toggle';
  toggle.textContent = children.length > 0 ? (expanded ? '−' : '+') : ' ';
  content.appendChild(toggle);
  
  // Icon
  const iconSpan = document.createElement('span');
  iconSpan.className = 'tree-icon';
  iconSpan.textContent = icon;
  content.appendChild(iconSpan);
  
  // Label
  const labelSpan = document.createElement('span');
  labelSpan.className = 'tree-label';
  labelSpan.textContent = label;
  content.appendChild(labelSpan);
  
  node.appendChild(content);
  
  // Children container
  if (children.length > 0) {
    const childContainer = document.createElement('div');
    childContainer.className = `tree-children${expanded ? '' : ' collapsed'}`;
    
    for (const child of children) {
      childContainer.appendChild(createTreeNode(child));
    }
    
    node.appendChild(childContainer);
    
    // Toggle click
    toggle.addEventListener('click', (e) => {
      e.stopPropagation();
      const isCollapsed = childContainer.classList.contains('collapsed');
      childContainer.classList.toggle('collapsed');
      toggle.textContent = isCollapsed ? '−' : '+';
    });
  }
  
  // Content click
  content.addEventListener('click', () => {
    // Deselect all
    document.querySelectorAll('.tree-node-content.selected').forEach(el => {
      el.classList.remove('selected');
    });
    content.classList.add('selected');
    
    if (data) {
      handleTreeSelection(data);
    }
  });
  
  return node;
}

function handleTreeSelection(data) {
  if (data.type === 'level') {
    setStatus(`Selected level: ${data.level.levelId}`);
    dom.renderTitle.textContent = `${data.level.levelId} - ${data.level.levelName}`;
    state.selectedLevel = data.level;
    state.selectedStage = null;
    
    // Log level info with copy-pastable addresses
    const level = data.level;
    const primaryFileOff = level.sectorOffset * SECTOR_SIZE;
    console.info(`📂 Level: ${level.levelId} - ${level.levelName}`);
    console.log(`Primary segment: sector ${level.sectorOffset} (file offset: 0x${primaryFileOff.toString(16).toUpperCase()})`);
    console.log(`Stages: ${level.stageCount}`);
    
    // Log all secondary/tertiary sector info
    console.log('Secondary sectors: ' + level.secSectorOff.slice(0, level.stageCount).map((s, i) => `[${i}]=${s}`).join(', '));
    console.log('Tertiary sectors: ' + level.tertSectorOff.slice(0, level.stageCount).map((s, i) => `[${i}]=${s}`).join(', '));
  } else if (data.type === 'stage') {
    setStatus(`Loading stage ${data.stageIndex} of ${data.level.levelId}...`);
    dom.renderTitle.textContent = `${data.level.levelId} - Stage ${data.stageIndex}`;
    state.selectedLevel = data.level;
    state.selectedStage = data.stageIndex;
    
    // Load and render stage
    const stageData = loadStageData(data.level, data.stageIndex);
    if (stageData) {
      state.cachedTiles = stageData;
      renderStage(stageData);
      setStatus(`Rendered stage ${data.stageIndex}`);
    } else {
      setStatus(`Failed to load stage ${data.stageIndex}`);
    }
  }
}

// ============================================================================
// File Loading
// ============================================================================

async function loadBLBFile(file) {
  showLoading(true, `Loading ${file.name}...`);
  
  try {
    console.info(`📂 Reading file: ${file.name}`);
    const startTime = performance.now();
    
    const buffer = await file.arrayBuffer();
    state.file = file;
    state.fileData = buffer;
    
    const readTime = (performance.now() - startTime).toFixed(1);
    console.log(`File loaded: ${formatSize(buffer.byteLength)} in ${readTime}ms`);
    
    // Parse header
    console.info('Parsing BLB header...');
    const { levels } = parseHeader(buffer);
    state.levels = levels;
    
    // Log level summary
    console.log(`Found ${levels.length} levels:`);
    for (const level of levels) {
      console.log(`  [${level.index}] ${level.levelId} - "${level.levelName}" (${level.stageCount} stages)`);
    }
    
    // Update UI
    dom.statusFile.textContent = file.name;
    dom.statusSize.textContent = formatSize(buffer.byteLength);
    
    // Enable controls
    dom.cameraX.disabled = false;
    dom.zoomLevel.disabled = false;
    dom.showEntities.disabled = false;
    dom.showGrid.disabled = false;
    dom.showMinimap.disabled = false;
    dom.mode90s.disabled = false;
    
    // Build tree
    buildTreeView();
    
    setStatus(`Loaded ${levels.length} levels from ${file.name}`);
    
    // Auto-select SCIE Stage 1 if available
    const scieLevel = levels.find(l => l.levelId === 'SCIE');
    if (scieLevel && scieLevel.stageCount > 1) {
      handleTreeSelection({ type: 'stage', level: scieLevel, stageIndex: 1 });
    }
  } catch (error) {
    console.error('Failed to load BLB:', error);
    setStatus(`Error: ${error.message}`);
  } finally {
    showLoading(false);
  }
}

// ============================================================================
// Event Handlers
// ============================================================================

dom.btnOpen.addEventListener('click', () => {
  dom.fileInput.click();
});

dom.fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) {
    loadBLBFile(file);
  }
});

dom.cameraX.addEventListener('input', (e) => {
  state.cameraX = parseInt(e.target.value, 10);
  dom.cameraXVal.textContent = state.cameraX;
  
  if (state.cachedTiles) {
    renderStage(state.cachedTiles);
  }
});

dom.zoomLevel.addEventListener('change', (e) => {
  state.zoom = parseInt(e.target.value, 10);
  
  if (state.cachedTiles) {
    renderStage(state.cachedTiles);
  }
});

dom.showEntities.addEventListener('change', (e) => {
  state.showEntities = e.target.checked;
  
  if (state.cachedTiles) {
    renderStage(state.cachedTiles);
  }
});

dom.showGrid.addEventListener('change', (e) => {
  state.showGrid = e.target.checked;
  
  if (state.cachedTiles) {
    renderStage(state.cachedTiles);
  }
});

dom.showMinimap.addEventListener('change', (e) => {
  state.showMinimap = e.target.checked;
  dom.minimapContainer.classList.toggle('visible', state.showMinimap);
  
  if (state.showMinimap && state.cachedTiles) {
    updateMinimap(state.cachedTiles);
  }
});

// 90s Mode group toggle
dom.mode90s.addEventListener('change', (e) => {
  state.mode90s = e.target.checked;
  
  // Enable/disable sub-options
  dom.optStaticBg.disabled = !state.mode90s;
  dom.optMouseFollow.disabled = !state.mode90s;
  dom.sensitivity.disabled = !state.mode90s || !state.mouseFollow;
  
  // When 90s mode is toggled, auto-enable sub-options
  if (state.mode90s) {
    state.staticBg = true;
    state.mouseFollow = true;
    dom.optStaticBg.checked = true;
    dom.optMouseFollow.checked = true;
    dom.sensitivity.disabled = false;
  }
  
  if (state.cachedTiles) {
    renderStage(state.cachedTiles);
  }
});

dom.optStaticBg.addEventListener('change', (e) => {
  state.staticBg = e.target.checked;
  
  if (state.cachedTiles) {
    renderStage(state.cachedTiles);
  }
});

dom.optMouseFollow.addEventListener('change', (e) => {
  state.mouseFollow = e.target.checked;
  dom.sensitivity.disabled = !state.mouseFollow;
  dom.cameraX.disabled = state.mouseFollow;
});

dom.sensitivity.addEventListener('input', (e) => {
  state.sensitivity = parseFloat(e.target.value);
  dom.sensitivityVal.textContent = state.sensitivity.toFixed(1) + '×';
});

// Mouse tracking for camera (when mouse follow is enabled)
dom.renderContainer.addEventListener('mousemove', (e) => {
  if (!state.mouseFollow || !state.cachedTiles || !state.levelWidth) return;
  
  const rect = dom.renderContainer.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;
  const containerWidth = rect.width;
  const containerHeight = rect.height;
  
  // Map mouse position to camera position with sensitivity
  const maxCameraX = Math.max(0, state.levelWidth - state.psxWidth);
  const maxCameraY = Math.max(0, state.levelHeight - state.psxHeight);
  
  // Normalize to -1..1 from center
  const centerX = containerWidth / 2;
  const centerY = containerHeight / 2;
  const normalizedX = (mouseX - centerX) / centerX;
  const normalizedY = (mouseY - centerY) / centerY;
  
  // Apply sensitivity and map to 0..1
  const scaledX = normalizedX * state.sensitivity;
  const scaledY = normalizedY * state.sensitivity;
  const mappedX = (scaledX + 1) / 2;
  const mappedY = (scaledY + 1) / 2;
  const clampedX = Math.max(0, Math.min(1, mappedX));
  const clampedY = Math.max(0, Math.min(1, mappedY));
  
  const newCameraX = Math.floor(clampedX * maxCameraX);
  const newCameraY = Math.floor(clampedY * maxCameraY);
  
  if (newCameraX !== state.cameraX || newCameraY !== state.cameraY) {
    state.cameraX = newCameraX;
    state.cameraY = newCameraY;
    dom.cameraX.value = newCameraX;
    dom.cameraXVal.textContent = newCameraX;
    renderStage(state.cachedTiles);
    
    if (state.showMinimap) {
      updateMinimapViewport();
    }
  }
});

// Drag and drop
document.body.addEventListener('dragover', (e) => {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
});

document.body.addEventListener('drop', (e) => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && (file.name.toLowerCase().endsWith('.blb'))) {
    loadBLBFile(file);
  }
});

// Initialize
setStatus('Ready - Open a BLB file or drag and drop');
console.info('BLB Viewer initialized');

// Console panel event handlers
dom.btnConsole.addEventListener('click', () => {
  consoleLogger.toggle();
});

dom.btnConsoleClear.addEventListener('click', () => {
  consoleLogger.clear();
});

dom.btnConsoleClose.addEventListener('click', () => {
  consoleLogger.hide();
});
</script>
