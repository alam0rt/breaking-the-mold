function createMetadataSection(title) {
    const section = document.createElement('div');
    section.className = 'metadata-section';
    section.innerHTML = `<h3>${title}</h3>`;
    return section;
}

function addFieldsToSection(section, fields) {
    const grid = document.createElement('div');
    grid.className = 'field-grid';
    
    fields.forEach(([name, value, isUnknown]) => {
        const row = document.createElement('div');
        row.className = 'field-row';
        row.innerHTML = `
            <span class="field-name">${name}</span>
            <span class="field-value ${isUnknown ? 'unknown' : ''}">${value}</span>
        `;
        grid.appendChild(row);
    });
    
    section.appendChild(grid);
}

function renderHexView(container, offset, length) {
    const bytes = blbFile.getBytes(offset, length);
    const div = document.createElement('div');
    div.className = 'hex-view';
    
    let html = '';
    for (let i = 0; i < bytes.length; i += 16) {
        const addr = (offset + i).toString(16).padStart(8, '0');
        let hexPart = '';
        let asciiPart = '';
        
        for (let j = 0; j < 16; j++) {
            if (i + j < bytes.length) {
                const byte = bytes[i + j];
                hexPart += byte.toString(16).padStart(2, '0') + ' ';
                asciiPart += (byte >= 32 && byte < 127) ? String.fromCharCode(byte) : '.';
            } else {
                hexPart += '   ';
                asciiPart += ' ';
            }
            if (j === 7) hexPart += ' ';
        }
        
        html += `<span class="hex-offset">${addr}</span><span class="hex-byte">${hexPart}</span><span class="hex-ascii">${asciiPart}</span>\n`;
    }
    
    div.textContent = '';
    div.innerHTML = html;
    container.appendChild(div);
}

function renderBinVis(container, offset, length) {
    const bytes = blbFile.getBytes(offset, length);
    
    const section = createMetadataSection('Binary Visualization');
    
    const width = 256;
    const height = Math.ceil(bytes.length / width);
    
    const canvas = document.createElement('canvas');
    canvas.className = 'binvis-canvas';
    canvas.width = width;
    canvas.height = height;
    canvas.style.width = (width * 2) + 'px';
    canvas.style.height = (height * 2) + 'px';
    
    const ctx = canvas.getContext('2d');
    const imageData = ctx.createImageData(width, height);
    
    for (let i = 0; i < bytes.length; i++) {
        const byte = bytes[i];
        const color = getBinVisColor(byte);
        const idx = i * 4;
        imageData.data[idx] = color.r;
        imageData.data[idx + 1] = color.g;
        imageData.data[idx + 2] = color.b;
        imageData.data[idx + 3] = 255;
    }
    
    ctx.putImageData(imageData, 0, 0);
    
    const visContainer = document.createElement('div');
    visContainer.className = 'binvis-container';
    visContainer.appendChild(canvas);
    
    // Legend
    const legend = document.createElement('div');
    legend.className = 'binvis-legend';
    legend.innerHTML = `
        <div class="legend-item"><div class="legend-color" style="background: #000"></div>0x00 (NULL)</div>
        <div class="legend-item"><div class="legend-color" style="background: #4a9"></div>ASCII printable</div>
        <div class="legend-item"><div class="legend-color" style="background: #49f"></div>ASCII control</div>
        <div class="legend-item"><div class="legend-color" style="background: #f94"></div>High bytes</div>
        <div class="legend-item"><div class="legend-color" style="background: #fff"></div>0xFF</div>
    `;
    visContainer.appendChild(legend);
    
    section.appendChild(visContainer);
    container.appendChild(section);
}

function getBinVisColor(byte) {
    if (byte === 0) return { r: 0, g: 0, b: 0 };
    if (byte === 0xFF) return { r: 255, g: 255, b: 255 };
    if (byte >= 0x20 && byte < 0x7F) {
        // ASCII printable - green gradient
        const t = (byte - 0x20) / (0x7F - 0x20);
        return { r: 68 + t * 50, g: 153 + t * 50, b: 136 + t * 50 };
    }
    if (byte < 0x20) {
        // ASCII control - blue gradient
        const t = byte / 0x20;
        return { r: 68 + t * 50, g: 153 + t * 50, b: 255 };
    }
    // High bytes - orange gradient
    const t = (byte - 0x7F) / (0xFF - 0x7F);
    return { r: 255, g: 153 - t * 50, b: 68 + t * 50 };
}

// ============================================================================
// Level Renderer Integration
// ============================================================================

// Asset IDs for level rendering
const LVL_ASSET_TILE_HEADER = 100;
const LVL_ASSET_TILE_PIXELS = 300;
const LVL_ASSET_TILE_PALETTES_IDX = 301;
const LVL_ASSET_TILE_FLAGS = 302;
const LVL_ASSET_PALETTES = 400;
const LVL_ASSET_TILEMAPS = 200;
const LVL_ASSET_LAYERS = 201;

let currentLevelRenderer = null;
let levelAnimationFrame = null;

function parseLevelTOC(segmentData) {
    if (!segmentData || segmentData.length < 4) return {};
    
    const view = new DataView(segmentData.buffer, segmentData.byteOffset || 0);
    const count = view.getUint32(0, true);
    
    if (count > 100 || count * 12 + 4 > segmentData.length) return {};
    
    const assets = {};
    for (let i = 0; i < count; i++) {
        const entryOffset = 4 + i * 12;
        const assetId = view.getUint32(entryOffset + 0, true);
        const size = view.getUint32(entryOffset + 4, true);
        const dataOffset = view.getUint32(entryOffset + 8, true);
        
        if (dataOffset + size <= segmentData.length) {
            assets[assetId] = segmentData.slice(dataOffset, dataOffset + size);
        }
    }
    return assets;
}

function parsePaletteRGBA(data, numColors = 256) {
    const colors = [];
    const maxColors = Math.min(numColors, Math.floor(data.length / 2));
    
    for (let i = 0; i < maxColors; i++) {
        const color = data[i * 2] | (data[i * 2 + 1] << 8);
        const r = ((color & 0x1F) * 255 / 31) | 0;
        const g = (((color >> 5) & 0x1F) * 255 / 31) | 0;
        const b = (((color >> 10) & 0x1F) * 255 / 31) | 0;
        const a = (i > 0 || (color & 0x8000)) ? 255 : 0;
        colors.push([r, g, b, a]);
    }
    while (colors.length < numColors) colors.push([0, 0, 0, 0]);
    return colors;
}

function parsePaletteContainerForRender(asset400Data) {
    if (!asset400Data || asset400Data.length < 4) return [];
    
    const view = new DataView(asset400Data.buffer, asset400Data.byteOffset || 0);
    const count = view.getUint32(0, true);
    if (count > 50) return [];
    
    const palettes = [];
    for (let i = 0; i < count; i++) {
        const entryOffset = 4 + i * 12;
        if (entryOffset + 12 > asset400Data.length) break;
        
        const size = view.getUint32(entryOffset + 4, true);
        const dataOffset = view.getUint32(entryOffset + 8, true);
        
        if (dataOffset + size <= asset400Data.length && size >= 512) {
            palettes.push(parsePaletteRGBA(asset400Data.slice(dataOffset, dataOffset + size)));
        } else {
            palettes.push(Array.from({length: 256}, (_, i) => [i, i, i, i > 0 ? 255 : 0]));
        }
    }
    return palettes;
}

function extractLevelTiles(secAssets) {
    const headerData = secAssets[LVL_ASSET_TILE_HEADER];
    const pixelData = secAssets[LVL_ASSET_TILE_PIXELS];
    const palIndices = secAssets[LVL_ASSET_TILE_PALETTES_IDX];
    const flagsData = secAssets[LVL_ASSET_TILE_FLAGS];
    const paletteData = secAssets[LVL_ASSET_PALETTES];
    
    if (!headerData || !pixelData || !palIndices || !paletteData) return [];
    
    const view = new DataView(headerData.buffer, headerData.byteOffset || 0);
    const count16x16 = view.getUint16(0x10, true);
    const count8x8 = view.getUint16(0x12, true);
    const totalTiles = count16x16 + count8x8;
    
    const palettes = parsePaletteContainerForRender(paletteData);
    if (palettes.length === 0) return [];
    
    const tiles = [];
    for (let i = 0; i < totalTiles; i++) {
        let is8x8 = flagsData && i < flagsData.length ? (flagsData[i] & 0x02) !== 0 : (i >= count16x16);
        const palIdx = palIndices[i] || 0;
        const palette = palettes[palIdx] || palettes[0];
        
        let tileOffset, tileSize, stride;
        if (is8x8) {
            tileOffset = count16x16 * 256 + (i - count16x16) * 128;
            tileSize = 8;
            stride = 16;
        } else {
            tileOffset = i * 256;
            tileSize = 16;
            stride = 16;
        }
        
        const imageData = new ImageData(16, 16);
        const scale = is8x8 ? 2 : 1;
        
        for (let y = 0; y < tileSize; y++) {
            for (let x = 0; x < tileSize; x++) {
                const pixOff = tileOffset + y * stride + x;
                if (pixOff >= pixelData.length) continue;
                
                const colorIdx = pixelData[pixOff];
                const color = palette[colorIdx] || [0, 0, 0, 0];
                
                for (let sy = 0; sy < scale; sy++) {
                    for (let sx = 0; sx < scale; sx++) {
                        const destX = x * scale + sx;
                        const destY = y * scale + sy;
                        const idx = (destY * 16 + destX) * 4;
                        imageData.data[idx] = color[0];
                        imageData.data[idx + 1] = color[1];
                        imageData.data[idx + 2] = color[2];
                        imageData.data[idx + 3] = color[3];
                    }
                }
            }
        }
        tiles.push(imageData);
    }
    return tiles;
}

function parseLevelLayerEntries(asset201Data) {
    if (!asset201Data) return [];
    
    const entries = [];
    const numLayers = Math.floor(asset201Data.length / 92);
    const view = new DataView(asset201Data.buffer, asset201Data.byteOffset || 0);
    
    for (let i = 0; i < numLayers; i++) {
        const offset = i * 92;
        entries.push({
            index: i,
            xOffset: view.getInt16(offset + 0x00, true),
            yOffset: view.getInt16(offset + 0x02, true),
            width: view.getUint16(offset + 0x04, true),
            height: view.getUint16(offset + 0x06, true),
            levelWidth: view.getUint16(offset + 0x08, true),
            levelHeight: view.getUint16(offset + 0x0A, true),
            scrollX: view.getUint32(offset + 0x10, true),
            scrollY: view.getUint32(offset + 0x14, true),
            layerType: asset201Data[offset + 0x26] || 0,
        });
    }
    return entries;
}

function parseLevelTilemapContainer(asset200Data) {
    if (!asset200Data || asset200Data.length < 4) return [];
    
    const view = new DataView(asset200Data.buffer, asset200Data.byteOffset || 0);
    const count = view.getUint32(0, true);
    if (count > 50) return [];
    
    const tilemaps = [];
    for (let i = 0; i < count; i++) {
        const entryOffset = 4 + i * 12;
        if (entryOffset + 12 > asset200Data.length) break;
        
        const size = view.getUint32(entryOffset + 4, true);
        const dataOffset = view.getUint32(entryOffset + 8, true);
        
        if (dataOffset + size <= asset200Data.length) {
            const tilemapData = asset200Data.slice(dataOffset, dataOffset + size);
            const tilemapView = new DataView(tilemapData.buffer, tilemapData.byteOffset || 0);
            const tileIndices = [];
            for (let j = 0; j < size / 2; j++) {
                tileIndices.push(tilemapView.getUint16(j * 2, true));
            }
            tilemaps.push(tileIndices);
        } else {
            tilemaps.push([]);
        }
    }
    return tilemaps;
}

function getLevelTileIndex(tileVal) {
    const idx = tileVal & 0x7FF;
    return idx > 0 ? idx - 1 : -1;
}

class IntegratedLevelRenderer {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.tiles = [];
        this.layers = [];
        this.tilemaps = [];
        this.levelWidth = 0;
        this.levelHeight = 0;
        this.bgColor = [0, 0, 0];
        this.layerVisibility = [];
        this.zoom = 1;
        this.showGrid = false;
        this.layerCanvases = [];
    }
    
    setData(tiles, layers, tilemaps, levelWidth, levelHeight, bgColor) {
        this.tiles = tiles;
        this.layers = layers;
        this.tilemaps = tilemaps;
        this.levelWidth = levelWidth;
        this.levelHeight = levelHeight;
        this.bgColor = bgColor;
        this.layerVisibility = layers.map(() => true);
        this.prerenderLayers();
    }
    
    prerenderLayers() {
        this.layerCanvases = [];
        
        for (let layerIdx = 0; layerIdx < this.layers.length; layerIdx++) {
            const layer = this.layers[layerIdx];
            const tilemap = this.tilemaps[layerIdx] || [];
            
            const canvasWidth = layer.width * 16;
            const canvasHeight = layer.height * 16;
            
            if (canvasWidth <= 0 || canvasHeight <= 0) {
                this.layerCanvases.push(null);
                continue;
            }
            
            const layerCanvas = document.createElement('canvas');
            layerCanvas.width = canvasWidth;
            layerCanvas.height = canvasHeight;
            const layerCtx = layerCanvas.getContext('2d');
            
            for (let y = 0; y < layer.height; y++) {
                for (let x = 0; x < layer.width; x++) {
                    const idx = y * layer.width + x;
                    if (idx >= tilemap.length) continue;
                    
                    const tileVal = tilemap[idx];
                    if (tileVal === 0) continue;
                    
                    const tileIdx = getLevelTileIndex(tileVal);
                    if (tileIdx < 0 || tileIdx >= this.tiles.length) continue;
                    
                    layerCtx.putImageData(this.tiles[tileIdx], x * 16, y * 16);
                }
            }
            
            this.layerCanvases.push({
                canvas: layerCanvas,
                xOffset: layer.xOffset,
                yOffset: layer.yOffset,
                scrollX: layer.scrollX,
                scrollY: layer.scrollY,
            });
        }
    }
    
    render(scrollOffset = 0) {
        const width = this.levelWidth * 16;
        const height = this.levelHeight * 16;
        
        if (width <= 0 || height <= 0) return;
        
        this.canvas.width = width;
        this.canvas.height = height;
        this.canvas.style.transform = `scale(${this.zoom})`;
        
        this.ctx.fillStyle = `rgb(${this.bgColor[0]}, ${this.bgColor[1]}, ${this.bgColor[2]})`;
        this.ctx.fillRect(0, 0, width, height);
        
        for (let i = 0; i < this.layerCanvases.length; i++) {
            if (!this.layerVisibility[i]) continue;
            
            const layerData = this.layerCanvases[i];
            if (!layerData) continue;
            
            let px = layerData.xOffset * 16;
            let py = layerData.yOffset * 16;
            
            if (layerData.scrollX !== 0x10000 && layerData.scrollX !== 0) {
                const factor = layerData.scrollX / 0x10000;
                px -= scrollOffset * (1 - factor);
            }
            
            this.ctx.drawImage(layerData.canvas, px, py);
        }
        
        if (this.showGrid) {
            this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            this.ctx.lineWidth = 1;
            
            for (let x = 0; x <= width; x += 16) {
                this.ctx.beginPath();
                this.ctx.moveTo(x, 0);
                this.ctx.lineTo(x, height);
                this.ctx.stroke();
            }
            for (let y = 0; y <= height; y += 16) {
                this.ctx.beginPath();
                this.ctx.moveTo(0, y);
                this.ctx.lineTo(width, y);
                this.ctx.stroke();
            }
        }
    }
    
    setLayerVisibility(index, visible) {
        if (index >= 0 && index < this.layerVisibility.length) {
            this.layerVisibility[index] = visible;
            this.render();
        }
    }
    
    setZoom(zoom) {
        this.zoom = zoom;
        this.render();
    }
    
    setShowGrid(show) {
        this.showGrid = show;
        this.render();
    }
}

async function renderLevelGraphics(container, level) {
    // Stop any existing animation
    if (levelAnimationFrame) {
        cancelAnimationFrame(levelAnimationFrame);
        levelAnimationFrame = null;
    }
    
    const wrapper = document.createElement('div');
    wrapper.className = 'level-render-container';
    
    // Loading message
    const loading = document.createElement('div');
    loading.className = 'level-render-loading';
    loading.textContent = 'Loading level data...';
    wrapper.appendChild(loading);
    container.appendChild(wrapper);
    
    await new Promise(r => setTimeout(r, 10));
    
    try {
        // Read secondary block (tiles, palettes)
        const secOffset = level.sectorOffset * 2048;
        const secSize = level.sectorCount * 2048;
        const secData = new Uint8Array(blbFile.buffer, secOffset, secSize);
        const secAssets = parseLevelTOC(secData);
        
        loading.textContent = 'Extracting tiles...';
        await new Promise(r => setTimeout(r, 10));
        
        const tiles = extractLevelTiles(secAssets);
        if (tiles.length === 0) {
            throw new Error('No tiles found in secondary block');
        }
        
        // Read tertiary block (tilemaps, layers)
        // Find tertiary data - look for assets 200 and 201 in segments
        let tertAssets = {};
        let levelWidth = 0, levelHeight = 0;
        let bgColor = [0, 0, 0];
        
        // Check if level has tertiary info
        if (level.tertBlockCount > 0) {
            // Use tertiary offsets from level entry
            // tertOffsets and tertCounts are stored in the level entry
            const tertOffset = level.tertOffsets ? level.tertOffsets[0] : 0;
            const tertCount = level.tertCounts ? level.tertCounts[0] : 0;
            
            if (tertOffset > 0 && tertCount > 0) {
                const tertByteOffset = tertOffset * 2048;
                const tertByteSize = tertCount * 2048;
                if (tertByteOffset + tertByteSize <= blbFile.buffer.byteLength) {
                    const tertData = new Uint8Array(blbFile.buffer, tertByteOffset, tertByteSize);
                    tertAssets = parseLevelTOC(tertData);
                    
                    // Get level dimensions from tertiary header (asset 100)
                    const tertHeader = tertAssets[LVL_ASSET_TILE_HEADER];
                    if (tertHeader && tertHeader.length >= 12) {
                        const hv = new DataView(tertHeader.buffer, tertHeader.byteOffset || 0);
                        bgColor = [tertHeader[0], tertHeader[1], tertHeader[2]];
                        levelWidth = hv.getUint16(0x08, true);
                        levelHeight = hv.getUint16(0x0A, true);
                    }
                }
            }
        }
        
        // Fallback: try to find tilemaps in secondary if tertiary failed
        if (!tertAssets[LVL_ASSET_TILEMAPS] && secAssets[LVL_ASSET_TILEMAPS]) {
            tertAssets = secAssets;
        }
        
        loading.textContent = 'Parsing layers...';
        await new Promise(r => setTimeout(r, 10));
        
        const layers = parseLevelLayerEntries(tertAssets[LVL_ASSET_LAYERS]);
        const tilemaps = parseLevelTilemapContainer(tertAssets[LVL_ASSET_TILEMAPS]);
        
        if (layers.length === 0 || tilemaps.length === 0) {
            throw new Error('No layers/tilemaps found');
        }
        
        // Use first layer's level dimensions if not found in header
        if (levelWidth === 0 && layers.length > 0) {
            levelWidth = layers[0].levelWidth || layers[0].width;
            levelHeight = layers[0].levelHeight || layers[0].height;
        }
        
        loading.textContent = 'Rendering...';
        await new Promise(r => setTimeout(r, 10));
        
        // Clear loading, build UI
        wrapper.innerHTML = '';
        
        // Toolbar
        const toolbar = document.createElement('div');
        toolbar.className = 'level-render-toolbar';
        toolbar.innerHTML = `
            <div class="toolbar-group">
                <label>Zoom:</label>
                <input type="range" id="lvl-zoom" min="0.25" max="4" step="0.25" value="1">
                <span class="zoom-value" id="lvl-zoom-value">100%</span>
            </div>
            <div class="toolbar-separator"></div>
            <div class="toolbar-group">
                <label><input type="checkbox" id="lvl-grid"> Grid</label>
            </div>
            <div class="toolbar-group">
                <label><input type="checkbox" id="lvl-animate"> Animate Parallax</label>
            </div>
        `;
        wrapper.appendChild(toolbar);
        
        // Layer controls
        const layerControls = document.createElement('div');
        layerControls.className = 'layer-controls';
        layers.forEach((layer, i) => {
            const toggle = document.createElement('label');
            toggle.className = 'layer-toggle';
            toggle.innerHTML = `<input type="checkbox" checked data-layer="${i}"> Layer ${i} (${layer.width}×${layer.height})`;
            layerControls.appendChild(toggle);
        });
        wrapper.appendChild(layerControls);
        
        // Viewport
        const viewport = document.createElement('div');
        viewport.className = 'level-viewport';
        const canvas = document.createElement('canvas');
        viewport.appendChild(canvas);
        wrapper.appendChild(viewport);
        
        // Info bar
        const info = document.createElement('div');
        info.className = 'level-render-info';
        info.innerHTML = `
            <span><strong>Size:</strong> ${levelWidth * 16}×${levelHeight * 16} px</span>
            <span><strong>Tiles:</strong> ${tiles.length}</span>
            <span><strong>Layers:</strong> ${layers.length}</span>
        `;
        wrapper.appendChild(info);
        
        // Create renderer
        const renderer = new IntegratedLevelRenderer(canvas);
        renderer.setData(tiles, layers, tilemaps, levelWidth, levelHeight, bgColor);
        renderer.render();
        currentLevelRenderer = renderer;
        
        // Event handlers
        document.getElementById('lvl-zoom').addEventListener('input', (e) => {
            const zoom = parseFloat(e.target.value);
            document.getElementById('lvl-zoom-value').textContent = `${Math.round(zoom * 100)}%`;
            renderer.setZoom(zoom);
        });
        
        document.getElementById('lvl-grid').addEventListener('change', (e) => {
            renderer.setShowGrid(e.target.checked);
        });
        
        document.getElementById('lvl-animate').addEventListener('change', (e) => {
            if (e.target.checked) {
                let scrollOffset = 0;
                function animate() {
                    scrollOffset += 2;
                    renderer.render(scrollOffset);
                    levelAnimationFrame = requestAnimationFrame(animate);
                }
                levelAnimationFrame = requestAnimationFrame(animate);
            } else {
                if (levelAnimationFrame) {
                    cancelAnimationFrame(levelAnimationFrame);
                    levelAnimationFrame = null;
                }
                renderer.render(0);
            }
        });
        
        layerControls.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', (e) => {
                const layerIdx = parseInt(e.target.dataset.layer);
                renderer.setLayerVisibility(layerIdx, e.target.checked);
            });
        });
        
    } catch (err) {
        wrapper.innerHTML = `
            <div class="level-render-loading" style="color: var(--accent-red);">
                <div>Error rendering level: ${err.message}</div>
            </div>
        `;
        console.error('Level render error:', err);
    }
}

async function renderStageGraphics(container, stage, level) {
    // Stop any existing animation
    if (levelAnimationFrame) {
        cancelAnimationFrame(levelAnimationFrame);
        levelAnimationFrame = null;
    }
    
    const wrapper = document.createElement('div');
    wrapper.className = 'level-render-container';
    
    // Loading message
    const loading = document.createElement('div');
    loading.className = 'level-render-loading';
    loading.textContent = `Loading Stage ${stage.index} data...`;
    wrapper.appendChild(loading);
    container.appendChild(wrapper);
    
    await new Promise(r => setTimeout(r, 10));
    
    try {
        // Determine which secondary block to use based on stage pairing rules:
        // Stage 0 uses base secondary (secBaseOffset, secBaseCount)
        // Stage N (N > 0) uses secSubOffsets[N-1] with secSubCounts[N-1]
        let secOffset, secSize;
        
        if (stage.index === 0) {
            // Stage 0 uses base secondary
            secOffset = level.secBaseOffset * 2048;
            secSize = level.secBaseCount ? level.secBaseCount * 2048 : 0;
            
            // If secBaseCount is 0, estimate size to first sub-offset
            if (secSize === 0 && level.secSubOffsets && level.secSubOffsets[0] > 0) {
                secSize = (level.secSubOffsets[0] - level.secBaseOffset) * 2048;
            }
            loading.textContent = `Loading Stage 0 (base secondary at sector ${level.secBaseOffset}, ${secSize / 2048} sectors)...`;
        } else {
            // Stage N uses secondary sub-block N-1
            const subIdx = stage.index - 1;
            if (level.secSubOffsets && subIdx < level.secSubOffsets.length && level.secSubOffsets[subIdx] > 0) {
                secOffset = level.secSubOffsets[subIdx] * 2048;
                // Use the corresponding secSubCounts entry for size
                secSize = (level.secSubCounts && level.secSubCounts[subIdx]) 
                    ? level.secSubCounts[subIdx] * 2048 
                    : 0;
                
                // Fallback: estimate size to next sub-offset
                if (secSize === 0) {
                    if (subIdx + 1 < level.secSubOffsets.length && level.secSubOffsets[subIdx + 1] > 0) {
                        secSize = (level.secSubOffsets[subIdx + 1] - level.secSubOffsets[subIdx]) * 2048;
                    } else {
                        // Last sub-block: estimate to next tertiary
                        const nextTertOffset = level.tertOffsets && level.tertOffsets[stage.index];
                        if (nextTertOffset && nextTertOffset > level.secSubOffsets[subIdx]) {
                            secSize = (nextTertOffset - level.secSubOffsets[subIdx]) * 2048;
                        } else {
                            secSize = 500 * 2048; // fallback to ~1MB
                        }
                    }
                }
                loading.textContent = `Loading Stage ${stage.index} (secondary sub-block ${subIdx} at sector ${level.secSubOffsets[subIdx]}, ${secSize / 2048} sectors)...`;
            } else {
                // Fallback to base secondary
                secOffset = level.secBaseOffset * 2048;
                secSize = level.secBaseCount ? level.secBaseCount * 2048 : level.sectorCount * 2048;
            }
        }
        
        await new Promise(r => setTimeout(r, 10));
        
        // Read secondary block (tiles, palettes)
        if (secOffset + secSize > blbFile.buffer.byteLength) {
            secSize = blbFile.buffer.byteLength - secOffset;
        }
        const secData = new Uint8Array(blbFile.buffer, secOffset, Math.max(0, secSize));
        const secAssets = parseLevelTOC(secData);
        
        loading.textContent = 'Extracting tiles...';
        await new Promise(r => setTimeout(r, 10));
        
        const tiles = extractLevelTiles(secAssets);
        if (tiles.length === 0) {
            throw new Error(`No tiles found in secondary block for stage ${stage.index}`);
        }
        
        // Read tertiary block for this stage (tilemaps, layers)
        let tertAssets = {};
        let levelWidth = 0, levelHeight = 0;
        let bgColor = [0, 0, 0];
        
        const tertOffset = stage.sectorOffset;
        const tertCount = stage.sectorCount;
        
        if (tertOffset > 0 && tertCount > 0) {
            const tertByteOffset = tertOffset * 2048;
            const tertByteSize = tertCount * 2048;
            if (tertByteOffset + tertByteSize <= blbFile.buffer.byteLength) {
                const tertData = new Uint8Array(blbFile.buffer, tertByteOffset, tertByteSize);
                tertAssets = parseLevelTOC(tertData);
                
                // Get level dimensions from tertiary header (asset 100)
                const tertHeader = tertAssets[LVL_ASSET_TILE_HEADER];
                if (tertHeader && tertHeader.length >= 12) {
                    const hv = new DataView(tertHeader.buffer, tertHeader.byteOffset || 0);
                    bgColor = [tertHeader[0], tertHeader[1], tertHeader[2]];
                    levelWidth = hv.getUint16(0x08, true);
                    levelHeight = hv.getUint16(0x0A, true);
                }
            }
        }
        
        // Fallback: try to find tilemaps in secondary if tertiary failed
        if (!tertAssets[LVL_ASSET_TILEMAPS] && secAssets[LVL_ASSET_TILEMAPS]) {
            tertAssets = secAssets;
        }
        
        loading.textContent = 'Parsing layers...';
        await new Promise(r => setTimeout(r, 10));
        
        const layers = parseLevelLayerEntries(tertAssets[LVL_ASSET_LAYERS]);
        const tilemaps = parseLevelTilemapContainer(tertAssets[LVL_ASSET_TILEMAPS]);
        
        if (layers.length === 0 || tilemaps.length === 0) {
            throw new Error(`No layers/tilemaps found for stage ${stage.index}`);
        }
        
        // Use first layer's level dimensions if not found in header
        if (levelWidth === 0 && layers.length > 0) {
            levelWidth = layers[0].levelWidth || layers[0].width;
            levelHeight = layers[0].levelHeight || layers[0].height;
        }
        
        loading.textContent = 'Rendering...';
        await new Promise(r => setTimeout(r, 10));
        
        // Clear loading, build UI
        wrapper.innerHTML = '';
        
        // Stage info header
        const stageInfo = document.createElement('div');
        stageInfo.className = 'level-render-info';
        stageInfo.innerHTML = `
            <span><strong>Stage ${stage.index}</strong></span>
            <span>Secondary: ${stage.index === 0 ? 'Base' : `Sub-block ${stage.index - 1}`}</span>
            <span>Tertiary: Sector ${tertOffset}</span>
        `;
        wrapper.appendChild(stageInfo);
        
        // Toolbar
        const toolbar = document.createElement('div');
        toolbar.className = 'level-render-toolbar';
        toolbar.innerHTML = `
            <div class="toolbar-group">
                <label>Zoom:</label>
                <input type="range" id="stage-zoom" min="0.25" max="4" step="0.25" value="1">
                <span class="zoom-value" id="stage-zoom-value">100%</span>
            </div>
            <div class="toolbar-separator"></div>
            <div class="toolbar-group">
                <label><input type="checkbox" id="stage-grid"> Grid</label>
            </div>
            <div class="toolbar-group">
                <label><input type="checkbox" id="stage-animate"> Animate Parallax</label>
            </div>
        `;
        wrapper.appendChild(toolbar);
        
        // Layer controls
        const layerControls = document.createElement('div');
        layerControls.className = 'layer-controls';
        layers.forEach((layer, i) => {
            const toggle = document.createElement('label');
            toggle.className = 'layer-toggle';
            toggle.innerHTML = `<input type="checkbox" checked data-layer="${i}"> Layer ${i} (${layer.width}×${layer.height})`;
            layerControls.appendChild(toggle);
        });
        wrapper.appendChild(layerControls);
        
        // Viewport
        const viewport = document.createElement('div');
        viewport.className = 'level-viewport';
        const canvas = document.createElement('canvas');
        viewport.appendChild(canvas);
        wrapper.appendChild(viewport);
        
        // Info bar
        const info = document.createElement('div');
        info.className = 'level-render-info';
        info.innerHTML = `
            <span><strong>Size:</strong> ${levelWidth * 16}×${levelHeight * 16} px</span>
            <span><strong>Tiles:</strong> ${tiles.length}</span>
            <span><strong>Layers:</strong> ${layers.length}</span>
        `;
        wrapper.appendChild(info);
        
        // Create renderer
        const renderer = new IntegratedLevelRenderer(canvas);
        renderer.setData(tiles, layers, tilemaps, levelWidth, levelHeight, bgColor);
        renderer.render();
        currentLevelRenderer = renderer;
        
        // Event handlers
        document.getElementById('stage-zoom').addEventListener('input', (e) => {
            const zoom = parseFloat(e.target.value);
            document.getElementById('stage-zoom-value').textContent = `${Math.round(zoom * 100)}%`;
            renderer.setZoom(zoom);
        });
        
        document.getElementById('stage-grid').addEventListener('change', (e) => {
            renderer.setShowGrid(e.target.checked);
        });
        
        document.getElementById('stage-animate').addEventListener('change', (e) => {
            if (e.target.checked) {
                let scrollOffset = 0;
                function animate() {
                    scrollOffset += 2;
                    renderer.render(scrollOffset);
                    levelAnimationFrame = requestAnimationFrame(animate);
                }
                levelAnimationFrame = requestAnimationFrame(animate);
            } else {
                if (levelAnimationFrame) {
                    cancelAnimationFrame(levelAnimationFrame);
                    levelAnimationFrame = null;
                }
                renderer.render(0);
            }
        });
        
        layerControls.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', (e) => {
                const layerIdx = parseInt(e.target.dataset.layer);
                renderer.setLayerVisibility(layerIdx, e.target.checked);
            });
        });
        
    } catch (err) {
        wrapper.innerHTML = `
            <div class="level-render-loading" style="color: var(--accent-red);">
                <div>Error rendering stage ${stage.index}: ${err.message}</div>
            </div>
        `;
        console.error('Stage render error:', err);
    }
}
</script>
