<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLB Asset Viewer</title>
    <style>
        :root {
            --bg-dark: #1e1e1e;
            --bg-darker: #141414;
            --bg-lighter: #2d2d2d;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-blue: #4fc3f7;
            --accent-green: #81c784;
            --accent-orange: #ffb74d;
            --accent-purple: #ba68c8;
            --accent-red: #e57373;
            --border-color: #3d3d3d;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', 'Consolas', monospace;
            background: var(--bg-dark);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        header {
            background: var(--bg-darker);
            padding: 10px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        header h1 {
            font-size: 18px;
            color: var(--accent-blue);
        }
        
        .file-input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        #fileInput {
            display: none;
        }
        
        .btn {
            background: var(--accent-blue);
            color: var(--bg-dark);
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        
        .btn:hover {
            opacity: 0.9;
        }
        
        #fileName {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        /* Tree Panel */
        .tree-panel {
            width: 350px;
            background: var(--bg-darker);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .tree-header {
            padding: 10px 15px;
            background: var(--bg-lighter);
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
            font-size: 14px;
        }
        
        .tree-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .tree-node {
            user-select: none;
        }
        
        .tree-node-header {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 4px;
            gap: 6px;
        }
        
        .tree-node-header:hover {
            background: var(--bg-lighter);
        }
        
        .tree-node-header.selected {
            background: var(--accent-blue);
            color: var(--bg-dark);
        }
        
        .tree-toggle {
            width: 16px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 12px;
        }
        
        .tree-icon {
            font-size: 14px;
        }
        
        .tree-label {
            font-size: 13px;
            flex: 1;
        }
        
        .tree-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            background: var(--bg-lighter);
            color: var(--text-secondary);
        }
        
        .tree-children {
            margin-left: 20px;
            display: none;
        }
        
        .tree-children.expanded {
            display: block;
        }
        
        /* Content Panel */
        .content-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .content-header {
            padding: 10px 15px;
            background: var(--bg-lighter);
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .view-tabs {
            display: flex;
            gap: 5px;
        }
        
        .tab-btn {
            background: var(--bg-dark);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .tab-btn.active {
            background: var(--accent-blue);
            color: var(--bg-dark);
            border-color: var(--accent-blue);
        }
        
        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        
        /* Metadata Display */
        .metadata-section {
            margin-bottom: 20px;
        }
        
        .metadata-section h3 {
            color: var(--accent-orange);
            font-size: 14px;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .field-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 8px;
        }
        
        .field-row {
            display: flex;
            gap: 10px;
            padding: 4px 8px;
            background: var(--bg-darker);
            border-radius: 4px;
        }
        
        .field-name {
            color: var(--accent-purple);
            min-width: 150px;
            font-size: 12px;
        }
        
        .field-value {
            color: var(--accent-green);
            font-family: 'Consolas', monospace;
            font-size: 12px;
        }
        
        .field-value.unknown {
            color: var(--accent-red);
        }
        
        /* Hex View */
        .hex-view {
            font-family: 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.6;
            background: var(--bg-darker);
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            white-space: pre;
        }
        
        .hex-offset {
            color: var(--accent-blue);
            margin-right: 15px;
        }
        
        .hex-byte {
            color: var(--text-primary);
        }
        
        .hex-ascii {
            color: var(--accent-green);
            margin-left: 15px;
        }
        
        /* Canvas Rendering */
        .render-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .render-item {
            background: var(--bg-darker);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .render-item canvas {
            image-rendering: pixelated;
            border: 1px solid var(--border-color);
        }
        
        .render-label {
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        /* Sprite Frame Grid */
        .frame-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .frame-card {
            background: var(--bg-darker);
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        
        .frame-card:hover {
            border-color: var(--accent-blue);
        }
        
        .frame-card.selected {
            border-color: var(--accent-green);
        }
        
        .frame-header {
            font-size: 12px;
            color: var(--accent-orange);
            margin-bottom: 8px;
        }
        
        .frame-canvas-container {
            display: flex;
            justify-content: center;
            background: #000;
            padding: 5px;
            margin-bottom: 8px;
        }
        
        .frame-details {
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        /* Palette Display */
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(16, 20px);
            gap: 2px;
            margin-top: 10px;
        }
        
        .palette-color {
            width: 20px;
            height: 20px;
            border: 1px solid var(--border-color);
        }
        
        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        /* BinVis */
        .binvis-container {
            margin-top: 15px;
        }
        
        .binvis-canvas {
            border: 1px solid var(--border-color);
            image-rendering: pixelated;
        }
        
        .binvis-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 10px;
            font-size: 12px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .legend-color {
            width: 16px;
            height: 16px;
            border: 1px solid var(--border-color);
        }
        
        /* Level Renderer */
        .level-render-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .level-render-toolbar {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            padding: 10px;
            background: var(--bg-darker);
            border-radius: 4px;
        }
        
        .level-render-toolbar label {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .level-render-toolbar select,
        .level-render-toolbar input[type="range"] {
            background: var(--bg-dark);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .level-render-toolbar input[type="checkbox"] {
            margin-right: 4px;
        }
        
        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .toolbar-separator {
            width: 1px;
            height: 20px;
            background: var(--border-color);
        }
        
        .zoom-value {
            font-family: monospace;
            font-size: 12px;
            min-width: 40px;
        }
        
        .level-viewport {
            position: relative;
            overflow: auto;
            background: #000;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            min-height: 400px;
            max-height: 600px;
        }
        
        .level-viewport canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            transform-origin: 0 0;
        }
        
        .layer-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px;
            background: var(--bg-darker);
            border-radius: 4px;
        }
        
        .layer-toggle {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 8px;
            background: var(--bg-lighter);
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        
        .layer-toggle:hover {
            background: var(--accent-blue);
            color: var(--bg-dark);
        }
        
        .layer-toggle input {
            margin: 0;
        }
        
        .level-render-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        .level-render-info {
            font-size: 12px;
            color: var(--text-secondary);
            padding: 10px;
            background: var(--bg-darker);
            border-radius: 4px;
        }
        
        .level-render-info span {
            margin-right: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🎮 BLB Asset Viewer</h1>
        <div class="file-input-wrapper">
            <input type="file" id="fileInput" accept=".blb,.BLB">
            <button class="btn" onclick="document.getElementById('fileInput').click()">Open BLB File</button>
            <span id="fileName">No file loaded</span>
        </div>
    </header>
    
    <div class="main-container">
        <div class="tree-panel">
            <div class="tree-header">📂 Asset Tree</div>
            <div class="tree-content" id="treeContent">
                <div class="empty-state">
                    <div class="empty-state-icon">📁</div>
                    <div>Load a BLB file to explore</div>
                </div>
            </div>
        </div>
        
        <div class="content-panel">
            <div class="content-header">
                <span id="contentTitle">Select an item</span>
                <div class="view-tabs">
                    <button class="tab-btn active" data-view="fields">Fields</button>
                    <button class="tab-btn" data-view="hex">Hex</button>
                    <button class="tab-btn" data-view="render">Render</button>
                    <button class="tab-btn" data-view="binvis">BinVis</button>
                </div>
            </div>
            <div class="content-body" id="contentBody">
                <div class="empty-state">
                    <div class="empty-state-icon">🔍</div>
                    <div>Select an item from the tree</div>
                </div>
            </div>
        </div>
    </div>

<script>
// ============================================================================
// BLB File Parser
// ============================================================================

class BLBFile {
    constructor(buffer) {
        this.buffer = buffer;
        this.view = new DataView(buffer);
        this.SECTOR_SIZE = 2048;
        this.header = this.parseHeader();
        this.levels = [];
        this.movies = [];
        
        this.parseTOC();
    }
    
    parseHeader() {
        // BLB Header structure (first 4096 bytes = 2 sectors)
        // Level table at 0x000 (0x70 bytes per entry)
        // Movie table at 0xB60 (0x1C bytes per entry)
        // Counts at 0xF31-0xF33
        return {
            levelCount: this.view.getUint8(0xF31),
            movieCount: this.view.getUint8(0xF32),
            sectorTableCount: this.view.getUint8(0xF33),
        };
    }
    
    parseTOC() {
        // Parse level entries at offset 0x000, 0x70 bytes each
        for (let i = 0; i < this.header.levelCount; i++) {
            const offset = i * 0x70;
            this.levels.push(this.parseLevelEntry(offset, i));
        }
        
        // Parse movie entries at offset 0xB60, 0x1C bytes each
        for (let i = 0; i < this.header.movieCount; i++) {
            const offset = 0xB60 + (i * 0x1C);
            this.movies.push(this.parseMovieEntry(offset, i));
        }
    }
    
    parseLevelEntry(offset, index) {
        // Level metadata entry is 0x70 (112) bytes
        const sectorOffset = this.view.getUint16(offset + 0x00, true);
        const sectorCount = this.view.getUint16(offset + 0x02, true);
        
        // Read secondary base info
        const secBaseOffset = this.view.getUint16(offset + 0x1E, true);
        const secBaseCount = this.view.getUint16(offset + 0x2C, true);
        
        // Read secondary sub-block info (5 slots)
        const secSubOffsets = [];
        const secSubCounts = [];
        for (let i = 0; i < 5; i++) {
            secSubOffsets.push(this.view.getUint16(offset + 0x20 + i * 2, true));
            secSubCounts.push(this.view.getUint16(offset + 0x2E + i * 2, true));
        }
        
        // Read tertiary sub-block info (6 slots at +0x3A for offsets, +0x48 for counts)
        const tertOffsets = [];
        const tertCounts = [];
        for (let i = 0; i < 6; i++) {
            tertOffsets.push(this.view.getUint16(offset + 0x3A + i * 2, true));
            tertCounts.push(this.view.getUint16(offset + 0x48 + i * 2, true));
        }
        
        const entry = {
            index,
            offset,
            sectorOffset,
            sectorCount,
            byteOffset: sectorOffset * this.SECTOR_SIZE,
            byteSize: sectorCount * this.SECTOR_SIZE,
            // Secondary info
            secBaseOffset,
            secBaseCount,
            secBaseByteOffset: secBaseOffset * this.SECTOR_SIZE,
            secBaseByteSize: secBaseCount * this.SECTOR_SIZE,
            secSubOffsets,
            secSubCounts,
            // Other fields
            unknown_04: this.view.getUint16(offset + 0x04, true),
            unknown_06: this.view.getUint16(offset + 0x06, true),
            entry1OffsetLo: this.view.getUint16(offset + 0x08, true),
            unknown_0A: this.view.getUint16(offset + 0x0A, true),
            levelIndex: this.view.getUint8(offset + 0x0C),
            levelFlag: this.view.getUint8(offset + 0x0D),
            tertBlockCount: this.view.getUint16(offset + 0x0E, true),
            tertOffsets,
            tertCounts,
            // Level ID at 0x56 (5 bytes, 4-char null-terminated)
            levelId: this.readString(offset + 0x56, 4),
            // Level name at 0x5B (21 bytes, null-terminated)
            name: this.readString(offset + 0x5B, 21),
            // Parsed data
            primarySegments: [],
            secondarySegments: [],
            stages: []  // Each stage has tertiary segments
        };
        
        // Parse container TOC for this level's primary data
        if (entry.byteOffset > 0 && entry.byteSize > 0) {
            try {
                entry.primarySegments = this.parseContainerTOC(entry.byteOffset);
                entry.segments = entry.primarySegments; // Keep for backward compat
            } catch (e) {
                console.warn(`Failed to parse primary for level ${entry.levelId}:`, e);
            }
        }
        
        // Parse secondary base (tiles, palettes)
        if (entry.secBaseByteOffset > 0 && entry.secBaseByteSize > 0) {
            try {
                entry.secondarySegments = this.parseContainerTOC(entry.secBaseByteOffset);
            } catch (e) {
                console.warn(`Failed to parse secondary for level ${entry.levelId}:`, e);
            }
        }
        
        // Parse tertiary blocks (stages)
        for (let i = 0; i < 6; i++) {
            if (tertCounts[i] > 0) {
                const tertByteOffset = tertOffsets[i] * this.SECTOR_SIZE;
                const tertByteSize = tertCounts[i] * this.SECTOR_SIZE;
                
                const stage = {
                    index: i,
                    sectorOffset: tertOffsets[i],
                    sectorCount: tertCounts[i],
                    byteOffset: tertByteOffset,
                    byteSize: tertByteSize,
                    segments: []
                };
                
                if (tertByteOffset > 0 && tertByteOffset + tertByteSize <= this.buffer.byteLength) {
                    try {
                        stage.segments = this.parseContainerTOC(tertByteOffset);
                    } catch (e) {
                        console.warn(`Failed to parse stage ${i} for level ${entry.levelId}:`, e);
                    }
                }
                
                entry.stages.push(stage);
            }
        }
        
        return entry;
    }
    
    parseMovieEntry(offset, index) {
        // Movie entry is 0x1C (28) bytes
        return {
            index,
            offset,
            unknown_00: this.view.getUint16(offset + 0x00, true),
            sectorCount: this.view.getUint16(offset + 0x02, true),
            movieId: this.readString(offset + 0x04, 4),
            shortName: this.readString(offset + 0x09, 2),
            filename: this.readString(offset + 0x0C, 16),
        };
    }
    
    parseContainerTOC(baseOffset) {
        const segments = [];
        
        // Container format:
        // 0x00: u32 entry_count
        // 0x04: entries[count] - each entry is 12 bytes:
        //   0x00: u32 asset_id
        //   0x04: u32 size  
        //   0x08: u32 offset (from container start)
        
        if (baseOffset + 4 > this.buffer.byteLength) return segments;
        
        const entryCount = this.view.getUint32(baseOffset, true);
        
        // Sanity check
        if (entryCount > 100 || entryCount === 0) return segments;
        
        for (let i = 0; i < entryCount; i++) {
            const tocOffset = baseOffset + 4 + (i * 12);
            if (tocOffset + 12 > this.buffer.byteLength) break;
            
            const assetId = this.view.getUint32(tocOffset, true);
            const size = this.view.getUint32(tocOffset + 4, true);
            const dataOffset = this.view.getUint32(tocOffset + 8, true);
            
            const segment = {
                index: i,
                typeId: assetId,
                dataOffset,
                dataSize: size,
                absoluteOffset: baseOffset + dataOffset,
                assets: []
            };
            
            segment.typeName = this.getAssetTypeName(assetId);
            
            // Parse assets within segment
            try {
                segment.assets = this.parseSegmentAssets(segment);
            } catch (e) {
                console.warn(`Failed to parse assets for segment ${assetId}:`, e);
            }
            
            segments.push(segment);
        }
        
        return segments;
    }
    
    parseSegmentAssets(segment) {
        const assets = [];
        const baseOffset = segment.absoluteOffset;
        const size = segment.dataSize;
        
        switch (segment.typeId) {
            case 0x64:  // 100 - Tile Header (36 bytes)
                assets.push(this.parseTileHeader(baseOffset, size));
                break;
            case 0xC8:  // 200 - Tilemap Container (sub-TOC)
                assets.push(this.parseTilemapContainer(baseOffset, size));
                break;
            case 0xC9:  // 201 - Layer Entries (92 bytes each)
                assets.push(...this.parseLayerEntries(baseOffset, size));
                break;
            case 0x12C: // 300 - Tile Pixel Data
                assets.push(this.parseTilePixelData(baseOffset, size));
                break;
            case 0x12D: // 301 - Palette Index per Tile
                assets.push(this.parsePaletteIndex(baseOffset, size));
                break;
            case 0x12E: // 302 - Tile Flags
                assets.push(this.parseTileFlags(baseOffset, size));
                break;
            case 0x190: // 400 - Palette Container (sub-TOC)
                assets.push(...this.parsePaletteContainer(baseOffset, size));
                break;
            case 0x191: // 401 - Animation Config
                assets.push(this.parseAnimationConfig(baseOffset, size));
                break;
            case 0x1F4: // 500 - Music Data
            case 0x1F5: // 501 - Audio Config
            case 0x1F6: // 502 - Audio Config
            case 0x1F7: // 503 - Audio Config
                assets.push(this.parseAudioData(baseOffset, size, segment.typeId));
                break;
            case 0x258: // 600 - Sprites (sub-TOC)
                assets.push(...this.parseSprites(baseOffset, size));
                break;
            case 0x259: // 601 - Collision/Layout (sub-TOC)
                assets.push(this.parseCollisionContainer(baseOffset, size));
                break;
            case 0x25A: // 602 - Palette Data (raw)
                assets.push(this.parseLevelPalette(baseOffset, size));
                break;
            case 0x2BC: // 700 - SPU Samples
                assets.push(this.parseSPUSamples(baseOffset, size));
                break;
            default:
                assets.push(this.parseGenericAsset(baseOffset, size, `Unknown Type ${segment.typeId} (0x${segment.typeId.toString(16)})`));
        }
        
        return assets;
    }
    
    // Asset 100 - Tile Header (36 bytes)
    parseTileHeader(offset, size) {
        return {
            type: 'TileHeader',
            offset,
            size,
            // Background color (bytes 0-2)
            bgR: this.view.getUint8(offset + 0x00),
            bgG: this.view.getUint8(offset + 0x01),
            bgB: this.view.getUint8(offset + 0x02),
            // Secondary color (bytes 4-6)
            secondaryR: this.view.getUint8(offset + 0x04),
            secondaryG: this.view.getUint8(offset + 0x05),
            secondaryB: this.view.getUint8(offset + 0x06),
            // Level dimensions
            levelWidth: this.view.getUint16(offset + 0x08, true),
            levelHeight: this.view.getUint16(offset + 0x0A, true),
            // Tile counts
            count16x16: this.view.getUint16(offset + 0x10, true),
            count8x8a: this.view.getUint16(offset + 0x12, true),
            count8x8b: this.view.getUint16(offset + 0x14, true),
            // Unknown field
            field1C: size >= 0x1E ? this.view.getUint16(offset + 0x1C, true) : 0,
        };
    }
    
    // Asset 200 - Tilemap Container (sub-TOC with tilemaps)
    parseTilemapContainer(offset, size) {
        if (size < 4) return { type: 'TilemapContainer', offset, size, layerCount: 0, layers: [] };
        
        const layerCount = this.view.getUint32(offset, true);
        const layers = [];
        
        for (let i = 0; i < layerCount && i < 20; i++) {
            const tocOffset = offset + 4 + (i * 12);
            if (tocOffset + 12 > this.buffer.byteLength) break;
            
            const layerIndex = this.view.getUint32(tocOffset, true);
            const tilemapSize = this.view.getUint32(tocOffset + 4, true);
            const tilemapOffset = this.view.getUint32(tocOffset + 8, true);
            
            layers.push({
                index: layerIndex,
                size: tilemapSize,
                offset: tilemapOffset,
                absoluteOffset: offset + tilemapOffset,
                tileCount: tilemapSize / 2,  // Each tile is u16
            });
        }
        
        return {
            type: 'TilemapContainer',
            offset,
            size,
            layerCount,
            layers,
        };
    }
    
    // Asset 201 - Layer Entries (92 bytes each)
    parseLayerEntries(offset, size) {
        const entries = [];
        const entryCount = Math.floor(size / 92);
        
        for (let i = 0; i < entryCount && i < 20; i++) {
            const entryOffset = offset + (i * 92);
            entries.push({
                type: 'LayerEntry',
                index: i,
                offset: entryOffset,
                xOffset: this.view.getUint16(entryOffset + 0x00, true),
                yOffset: this.view.getUint16(entryOffset + 0x02, true),
                width: this.view.getUint16(entryOffset + 0x04, true),
                height: this.view.getUint16(entryOffset + 0x06, true),
                levelWidth: this.view.getUint16(entryOffset + 0x08, true),
                levelHeight: this.view.getUint16(entryOffset + 0x0A, true),
                scrollX: this.view.getUint32(entryOffset + 0x10, true),
                scrollY: this.view.getUint32(entryOffset + 0x14, true),
                layerType: this.view.getUint8(entryOffset + 0x26),
                bgR: this.view.getUint8(entryOffset + 0x2C),
                bgG: this.view.getUint8(entryOffset + 0x2D),
                bgB: this.view.getUint8(entryOffset + 0x2E),
            });
        }
        
        return entries;
    }
    
    // Asset 300 - Tile Pixel Data
    parseTilePixelData(offset, size) {
        return {
            type: 'TilePixelData',
            offset,
            size,
            // Estimate tile count (256 bytes per 16x16 tile, 128 bytes per 8x8 tile)
            estimatedTiles16x16: Math.floor(size / 256),
        };
    }
    
    // Asset 301 - Palette Index per Tile
    parsePaletteIndex(offset, size) {
        return {
            type: 'TilePaletteIndex',
            offset,
            size,
            tileCount: size,  // 1 byte per tile
        };
    }
    
    // Asset 302 - Tile Flags
    parseTileFlags(offset, size) {
        // Count flags
        let semiTransCount = 0;
        let size8x8Count = 0;
        let skipCount = 0;
        
        for (let i = 0; i < size && i < 5000; i++) {
            const flag = this.view.getUint8(offset + i);
            if (flag & 0x01) semiTransCount++;
            if (flag & 0x02) size8x8Count++;
            if (flag & 0x04) skipCount++;
        }
        
        return {
            type: 'TileFlags',
            offset,
            size,
            tileCount: size,
            semiTransCount,
            size8x8Count,
            skipCount,
        };
    }
    
    // Asset 400 - Palette Container (sub-TOC with 256-color palettes)
    parsePaletteContainer(offset, size) {
        if (size < 4) return [];
        
        const paletteCount = this.view.getUint32(offset, true);
        const palettes = [];
        
        for (let i = 0; i < paletteCount && i < 50; i++) {
            const tocOffset = offset + 4 + (i * 12);
            if (tocOffset + 12 > this.buffer.byteLength) break;
            
            const paletteIndex = this.view.getUint32(tocOffset, true);
            const paletteSize = this.view.getUint32(tocOffset + 4, true);
            const paletteOffset = this.view.getUint32(tocOffset + 8, true);
            
            const absoluteOffset = offset + paletteOffset;
            const colorCount = paletteSize / 2;
            const colors = [];
            
            for (let c = 0; c < colorCount && c < 256; c++) {
                const colorOffset = absoluteOffset + (c * 2);
                if (colorOffset + 2 > this.buffer.byteLength) break;
                const color16 = this.view.getUint16(colorOffset, true);
                colors.push(this.convertPSXColor(color16));
            }
            
            palettes.push({
                type: 'Palette256',
                index: paletteIndex,
                offset: absoluteOffset,
                size: paletteSize,
                colorCount,
                colors,
            });
        }
        
        return palettes;
    }
    
    // Asset 401 - Animation Config
    parseAnimationConfig(offset, size) {
        return {
            type: 'AnimationConfig',
            offset,
            size,
        };
    }
    
    // Assets 500-503 - Audio Data
    parseAudioData(offset, size, typeId) {
        const typeNames = {
            0x1F4: 'Music Data (500)',
            0x1F5: 'Audio Config (501)',
            0x1F6: 'Audio Config (502)',
            0x1F7: 'Audio Config (503)',
        };
        return {
            type: 'AudioData',
            typeName: typeNames[typeId] || `Audio ${typeId}`,
            offset,
            size,
        };
    }
    
    // Asset 601 - Collision/Layout Container
    parseCollisionContainer(offset, size) {
        // This is a container with sub-TOC, similar to 600
        if (size < 4) return { type: 'CollisionContainer', offset, size, entryCount: 0, entries: [] };
        
        const entryCount = this.view.getUint32(offset, true);
        const entries = [];
        
        // Sanity check
        if (entryCount > 0 && entryCount < 100) {
            for (let i = 0; i < entryCount; i++) {
                const tocOffset = offset + 4 + (i * 12);
                if (tocOffset + 12 > this.buffer.byteLength) break;
                
                entries.push({
                    id: this.view.getUint32(tocOffset, true),
                    size: this.view.getUint32(tocOffset + 4, true),
                    offset: this.view.getUint32(tocOffset + 8, true),
                });
            }
        }
        
        return {
            type: 'CollisionContainer',
            offset,
            size,
            entryCount,
            entries,
        };
    }
    
    // Asset 602 - Level Palette (raw 15-bit colors)
    parseLevelPalette(offset, size) {
        const colorCount = size / 2;
        const colors = [];
        
        for (let i = 0; i < colorCount && i < 256; i++) {
            const color16 = this.view.getUint16(offset + (i * 2), true);
            colors.push(this.convertPSXColor(color16));
        }
        
        return {
            type: 'LevelPalette',
            offset,
            size,
            colorCount,
            colors,
        };
    }
    
    // Asset 700 - SPU Samples
    parseSPUSamples(offset, size) {
        return {
            type: 'SPUSamples',
            offset,
            size,
        };
    }
    
    convertPSXColor(color16) {
        // PSX 15-bit color: MBBBBBGGGGGRRRRR
        const r = (color16 & 0x1F) * 8;
        const g = ((color16 >> 5) & 0x1F) * 8;
        const b = ((color16 >> 10) & 0x1F) * 8;
        const stp = (color16 >> 15) & 1;
        return { r, g, b, stp, raw: color16 };
    }
    
    parseSprites(offset, size) {
        // Asset 600 (0x258) is a CONTAINER with sub-TOC
        // Format: u32 count, then count × 12-byte entries (asset_id, size, offset)
        const sprites = [];
        
        if (offset + 4 > this.buffer.byteLength) return sprites;
        
        const entryCount = this.view.getUint32(offset, true);
        
        // Sanity check - sprite containers typically have 1-50 entries
        if (entryCount === 0 || entryCount > 200) return sprites;
        
        for (let i = 0; i < entryCount; i++) {
            const tocOffset = offset + 4 + (i * 12);
            if (tocOffset + 12 > this.buffer.byteLength) break;
            
            const spriteId = this.view.getUint32(tocOffset, true);
            const spriteSize = this.view.getUint32(tocOffset + 4, true);
            const spriteDataOffset = this.view.getUint32(tocOffset + 8, true);
            
            const absoluteOffset = offset + spriteDataOffset;
            
            if (absoluteOffset + 12 <= this.buffer.byteLength) {
                const sprite = this.parseSpriteData(absoluteOffset, spriteSize, i, spriteId);
                sprites.push(sprite);
            }
        }
        
        return sprites;
    }
    
    parseSpriteData(offset, size, index, spriteId) {
        // Sprite header is 12 bytes:
        // +0x00: u16 animation_count
        // +0x02: u16 frame_meta_offset
        // +0x04: u32 rle_offset
        // +0x08: u32 palette_offset
        
        const animationCount = this.view.getUint16(offset, true);
        const frameMetaOffset = this.view.getUint16(offset + 0x02, true);
        const rleOffset = this.view.getUint32(offset + 0x04, true);
        const paletteOffset = this.view.getUint32(offset + 0x08, true);
        
        // Parse animations (12 bytes each, starting at offset + 0x0C)
        const animations = [];
        for (let i = 0; i < animationCount && i < 50; i++) {
            const animOffset = offset + 0x0C + (i * 12);
            if (animOffset + 12 > this.buffer.byteLength) break;
            
            animations.push({
                animationId: this.view.getUint32(animOffset, true),
                frameCount: this.view.getUint16(animOffset + 0x04, true),
                frameIndex: this.view.getUint16(animOffset + 0x06, true),
                flags: this.view.getUint16(animOffset + 0x08, true),
                extra: this.view.getUint16(animOffset + 0x0A, true),
            });
        }
        
        // Calculate total frame count from animations
        let totalFrames = 0;
        if (animations.length > 0) {
            totalFrames = Math.max(...animations.map(a => a.frameIndex + a.frameCount));
        }
        
        // Parse frame metadata (36 bytes each)
        const frames = [];
        const frameBaseOffset = offset + frameMetaOffset;
        for (let i = 0; i < totalFrames && i < 200; i++) {
            const frameOffset = frameBaseOffset + (i * 36);
            if (frameOffset + 36 > this.buffer.byteLength) break;
            frames.push(this.parseSpriteFrame(frameOffset, i));
        }
        
        return {
            type: 'Sprite',
            index,
            spriteId,
            offset,
            size,
            animationCount,
            frameMetaOffset,
            rleOffset,
            paletteOffset,
            animations,
            frames,
            totalFrames,
        };
    }
    
    parseSpriteFrame(offset, index) {
        return {
            index,
            offset,
            unknown_00: this.view.getUint32(offset, true),
            flags: this.view.getUint16(offset + 0x04, true),
            renderX: this.view.getUint16(offset + 0x06, true),
            renderY: this.view.getUint16(offset + 0x08, true),
            width: this.view.getUint16(offset + 0x0A, true),
            height: this.view.getUint16(offset + 0x0C, true),
            offsetAdjustX: this.view.getInt16(offset + 0x0E, true),
            offsetAdjustY: this.view.getInt16(offset + 0x10, true),
            anchorX: this.view.getUint16(offset + 0x12, true),
            anchorY: this.view.getUint16(offset + 0x14, true),
            clipWidth: this.view.getUint16(offset + 0x16, true),
            clipHeight: this.view.getUint16(offset + 0x18, true),
            unknown_1A: this.view.getUint16(offset + 0x1A, true),
            collisionFlag: this.view.getUint16(offset + 0x1C, true),
            unknown_1E: this.view.getUint16(offset + 0x1E, true),
            rleOffset: this.view.getUint32(offset + 0x20, true),
        };
    }
    
    parseGenericAsset(offset, size, typeName) {
        return {
            type: 'Generic',
            typeName,
            offset,
            size,
        };
    }
    
    getAssetTypeName(typeId) {
        const types = {
            0x64: 'Tile Header (100)',
            0xC8: 'Tilemap Header (200)',
            0xC9: 'Layer Entries (201)',
            0x12C: 'Tile Pixels (300)',
            0x12D: 'Tile Palette Index (301)',
            0x12E: 'Tile Flags (302)',
            0x190: 'Palette Container (400)',
            0x191: 'Animation Config (401)',
            0x1F4: 'Music Data (500)',
            0x1F5: 'Audio Config (501)',
            0x1F6: 'Audio Config (502)',
            0x1F7: 'Audio Config (503)',
            0x258: 'Sprites (600)',
            0x259: 'Collision/Layout (601)',
            0x25A: 'Palette Data (602)',
            0x2BC: 'SPU Samples (700)',
        };
        return types[typeId] || `Unknown (${typeId})`;
    }
    
    readString(offset, length) {
        let str = '';
        for (let i = 0; i < length; i++) {
            const byte = this.view.getUint8(offset + i);
            if (byte === 0) break;
            str += String.fromCharCode(byte);
        }
        return str;
    }
    
    getBytes(offset, length) {
        return new Uint8Array(this.buffer, offset, Math.min(length, this.buffer.byteLength - offset));
    }
}

// ============================================================================
// UI State & Rendering
// ============================================================================

let blbFile = null;
let selectedNode = null;
let currentView = 'fields';

// File input handler
document.getElementById('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    document.getElementById('fileName').textContent = file.name;
    
    const buffer = await file.arrayBuffer();
    blbFile = new BLBFile(buffer);
    
    buildTree();
});

// View tab handlers
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentView = btn.dataset.view;
        if (selectedNode) {
            renderContent(selectedNode);
        }
    });
});

function buildTree() {
    const container = document.getElementById('treeContent');
    container.innerHTML = '';
    
    if (!blbFile) return;
    
    // Root node for header
    const headerNode = createTreeNode('📋', 'BLB Header', 'header', { type: 'header' });
    container.appendChild(headerNode);
    
    // Levels folder
    const levelsFolder = createTreeNode('📁', `Levels (${blbFile.levels.length})`, 'folder');
    const levelsChildren = document.createElement('div');
    levelsChildren.className = 'tree-children';
    
    blbFile.levels.forEach(level => {
        const stageCount = level.stages ? level.stages.length : 0;
        const levelNode = createTreeNode('🎮', `${level.levelId} - ${level.name}`, 'level', { type: 'level', data: level });
        const levelChildren = document.createElement('div');
        levelChildren.className = 'tree-children';
        
        // PRIMARY segment container
        if (level.primarySegments && level.primarySegments.length > 0) {
            const primaryNode = createTreeNode('📦', `Primary (${level.primarySegments.length} assets)`, 'container', 
                { type: 'container', containerType: 'primary', data: level, segments: level.primarySegments });
            const primaryChildren = document.createElement('div');
            primaryChildren.className = 'tree-children';
            
            level.primarySegments.forEach(segment => {
                const segmentNode = createTreeNode(
                    getSegmentIcon(segment.typeId),
                    segment.typeName,
                    'segment',
                    { type: 'segment', data: segment, level, containerType: 'primary' }
                );
                
                if (segment.assets && segment.assets.length > 0) {
                    const segmentChildren = document.createElement('div');
                    segmentChildren.className = 'tree-children';
                    
                    segment.assets.forEach((asset, i) => {
                        const assetLabel = getAssetLabel(asset);
                        const assetNode = createTreeNode(
                            getAssetIcon(asset.type),
                            assetLabel,
                            'asset',
                            { type: 'asset', data: asset, segment, level }
                        );
                        segmentChildren.appendChild(assetNode);
                    });
                    
                    segmentNode.appendChild(segmentChildren);
                }
                
                primaryChildren.appendChild(segmentNode);
            });
            
            primaryNode.appendChild(primaryChildren);
            levelChildren.appendChild(primaryNode);
        }
        
        // SECONDARY segment container (base tileset)
        if (level.secondarySegments && level.secondarySegments.length > 0) {
            const secondaryNode = createTreeNode('🎨', `Secondary - Tiles (${level.secondarySegments.length} assets)`, 'container',
                { type: 'container', containerType: 'secondary', data: level, segments: level.secondarySegments });
            const secondaryChildren = document.createElement('div');
            secondaryChildren.className = 'tree-children';
            
            level.secondarySegments.forEach(segment => {
                const segmentNode = createTreeNode(
                    getSegmentIcon(segment.typeId),
                    segment.typeName,
                    'segment',
                    { type: 'segment', data: segment, level, containerType: 'secondary' }
                );
                
                if (segment.assets && segment.assets.length > 0) {
                    const segmentChildren = document.createElement('div');
                    segmentChildren.className = 'tree-children';
                    
                    segment.assets.forEach((asset, i) => {
                        const assetLabel = getAssetLabel(asset);
                        const assetNode = createTreeNode(
                            getAssetIcon(asset.type),
                            assetLabel,
                            'asset',
                            { type: 'asset', data: asset, segment, level }
                        );
                        segmentChildren.appendChild(assetNode);
                    });
                    
                    segmentNode.appendChild(segmentChildren);
                }
                
                secondaryChildren.appendChild(segmentNode);
            });
            
            secondaryNode.appendChild(secondaryChildren);
            levelChildren.appendChild(secondaryNode);
        }
        
        // STAGES (tertiary blocks)
        if (level.stages && level.stages.length > 0) {
            const stagesNode = createTreeNode('🗂️', `Stages (${level.stages.length})`, 'folder');
            const stagesChildren = document.createElement('div');
            stagesChildren.className = 'tree-children';
            
            level.stages.forEach(stage => {
                const stageSizeKB = Math.round(stage.byteSize / 1024);
                const assetCount = stage.segments ? stage.segments.length : 0;
                const stageNode = createTreeNode('📍', `Stage ${stage.index} (${assetCount} assets, ${stageSizeKB} KB)`, 'stage',
                    { type: 'stage', data: stage, level });
                const stageChildren = document.createElement('div');
                stageChildren.className = 'tree-children';
                
                if (stage.segments) {
                    stage.segments.forEach(segment => {
                        const segmentNode = createTreeNode(
                            getSegmentIcon(segment.typeId),
                            segment.typeName,
                            'segment',
                            { type: 'segment', data: segment, level, stage, containerType: 'tertiary' }
                        );
                        
                        if (segment.assets && segment.assets.length > 0) {
                            const segmentChildren = document.createElement('div');
                            segmentChildren.className = 'tree-children';
                            
                            segment.assets.forEach((asset, i) => {
                                const assetLabel = getAssetLabel(asset);
                                const assetNode = createTreeNode(
                                    getAssetIcon(asset.type),
                                    assetLabel,
                                    'asset',
                                    { type: 'asset', data: asset, segment, level, stage }
                                );
                                segmentChildren.appendChild(assetNode);
                            });
                            
                            segmentNode.appendChild(segmentChildren);
                        }
                        
                        stageChildren.appendChild(segmentNode);
                    });
                }
                
                stageNode.appendChild(stageChildren);
                stagesChildren.appendChild(stageNode);
            });
            
            stagesNode.appendChild(stagesChildren);
            levelChildren.appendChild(stagesNode);
        }
        
        levelNode.appendChild(levelChildren);
        levelsChildren.appendChild(levelNode);
    });
    
    levelsFolder.appendChild(levelsChildren);
    container.appendChild(levelsFolder);
    
    // Movies folder
    if (blbFile.movies.length > 0) {
        const moviesFolder = createTreeNode('📁', `Movies (${blbFile.movies.length})`, 'folder');
        const moviesChildren = document.createElement('div');
        moviesChildren.className = 'tree-children';
        
        blbFile.movies.forEach(movie => {
            const movieNode = createTreeNode('🎬', `${movie.movieId} - ${movie.filename}`, 'movie', { type: 'movie', data: movie });
            moviesChildren.appendChild(movieNode);
        });
        
        moviesFolder.appendChild(moviesChildren);
        container.appendChild(moviesFolder);
    }
}

function createTreeNode(icon, label, nodeType, nodeData = null) {
    const node = document.createElement('div');
    node.className = 'tree-node';
    
    const header = document.createElement('div');
    header.className = 'tree-node-header';
    
    const hasChildren = ['folder', 'level', 'segment', 'container', 'stage'].includes(nodeType);
    
    header.innerHTML = `
        <span class="tree-toggle">${hasChildren ? '▶' : ''}</span>
        <span class="tree-icon">${icon}</span>
        <span class="tree-label">${label}</span>
    `;
    
    header.addEventListener('click', (e) => {
        e.stopPropagation();
        
        // Toggle expansion
        if (hasChildren) {
            const children = node.querySelector('.tree-children');
            if (children) {
                children.classList.toggle('expanded');
                header.querySelector('.tree-toggle').textContent = 
                    children.classList.contains('expanded') ? '▼' : '▶';
            }
        }
        
        // Select node
        if (nodeData) {
            document.querySelectorAll('.tree-node-header.selected').forEach(h => h.classList.remove('selected'));
            header.classList.add('selected');
            selectedNode = nodeData;
            renderContent(nodeData);
        }
    });
    
    node.appendChild(header);
    return node;
}

function getSegmentIcon(typeId) {
    const icons = {
        0x64: '🧱',   // Tile Header
        0xC8: '🗺️',   // Tilemap Container
        0xC9: '📐',   // Layer Entries
        0x12C: '🖼️',  // Tile Pixels
        0x12D: '🎨',  // Palette Index
        0x12E: '🚩',  // Tile Flags
        0x190: '🎨',  // Palette Container
        0x191: '⚙️',  // Animation Config
        0x1F4: '🎵',  // Music
        0x1F5: '🔊',  // Audio Config
        0x1F6: '🔊',  // Audio Config
        0x1F7: '🔊',  // Audio Config
        0x258: '👾',  // Sprites
        0x259: '💥',  // Collision
        0x25A: '🎨',  // Palette
        0x2BC: '🔊',  // SPU Samples
    };
    return icons[typeId] || '📦';
}

function getAssetLabel(asset) {
    switch (asset.type) {
        case 'Sprite':
            return `Sprite ${asset.spriteId} (${asset.animationCount} anims, ${asset.totalFrames} frames)`;
        case 'Palette256':
            return `Palette ${asset.index} (${asset.colorCount} colors)`;
        case 'LevelPalette':
            return `Level Palette (${asset.colorCount} colors)`;
        case 'LayerEntry':
            return `Layer ${asset.index} (${asset.width}×${asset.height} tiles)`;
        case 'TileHeader':
            return `Tile Header (${asset.levelWidth}×${asset.levelHeight} tiles)`;
        case 'TilemapContainer':
            return `Tilemap Container (${asset.layerCount} layers)`;
        case 'TilePixelData':
            return `Tile Pixels (~${asset.estimatedTiles16x16} tiles)`;
        case 'TilePaletteIndex':
            return `Palette Index (${asset.tileCount} tiles)`;
        case 'TileFlags':
            return `Tile Flags (${asset.tileCount} tiles)`;
        case 'CollisionContainer':
            return `Collision (${asset.entryCount} entries)`;
        case 'AudioData':
            return asset.typeName;
        case 'SPUSamples':
            return `SPU Samples (${asset.size} bytes)`;
        case 'AnimationConfig':
            return `Animation Config (${asset.size} bytes)`;
        case 'Generic':
            return asset.typeName;
        default:
            return asset.type;
    }
}

function getAssetIcon(assetType) {
    const icons = {
        'Sprite': '👾',
        'Palette256': '🎨',
        'LevelPalette': '🎨',
        'LayerEntry': '📐',
        'TileHeader': '🧱',
        'TilemapContainer': '🗺️',
        'TilePixelData': '🖼️',
        'TilePaletteIndex': '🎨',
        'TileFlags': '🚩',
        'CollisionContainer': '💥',
        'AudioData': '🔊',
        'SPUSamples': '🔊',
        'AnimationConfig': '⚙️',
        'Generic': '📦',
    };
    return icons[assetType] || '📦';
}

function renderContent(nodeData) {
    const container = document.getElementById('contentBody');
    const title = document.getElementById('contentTitle');
    
    container.innerHTML = '';
    
    switch (nodeData.type) {
        case 'header':
            title.textContent = 'BLB Header';
            renderHeader(container);
            break;
        case 'level':
            title.textContent = `Level: ${nodeData.data.levelId} - ${nodeData.data.name}`;
            renderLevel(container, nodeData.data);
            break;
        case 'container':
            const containerName = nodeData.containerType === 'primary' ? 'Primary' : 
                                  nodeData.containerType === 'secondary' ? 'Secondary (Tiles)' : 'Container';
            title.textContent = `${containerName}: ${nodeData.data.levelId}`;
            renderContainer(container, nodeData);
            break;
        case 'stage':
            title.textContent = `Stage ${nodeData.data.index}: ${nodeData.level.levelId}`;
            renderStage(container, nodeData.data, nodeData.level);
            break;
        case 'movie':
            title.textContent = `Movie: ${nodeData.data.movieId}`;
            renderMovie(container, nodeData.data);
            break;
        case 'segment':
            title.textContent = `Segment: ${nodeData.data.typeName}`;
            renderSegment(container, nodeData.data, nodeData.level);
            break;
        case 'asset':
            title.textContent = `Asset: ${nodeData.data.type}`;
            renderAsset(container, nodeData.data, nodeData.segment, nodeData.level);
            break;
    }
}

function renderHeader(container) {
    if (currentView === 'fields') {
        // File info section
        const fileSection = createMetadataSection('File Information');
        const fileFields = [
            ['File Size', `${blbFile.buffer.byteLength.toLocaleString()} bytes (${(blbFile.buffer.byteLength / (1024 * 1024)).toFixed(2)} MB)`],
            ['Sector Size', '2048 bytes'],
            ['Sector Count', Math.ceil(blbFile.buffer.byteLength / 2048)],
        ];
        addFieldsToSection(fileSection, fileFields);
        container.appendChild(fileSection);
        
        // Header counts section
        const section = createMetadataSection('BLB Header Fields');
        const fields = [
            ['Level Count', blbFile.header.levelCount],
            ['Movie Count', blbFile.header.movieCount],
            ['Sector Table Count', blbFile.header.sectorTableCount],
            ['Levels Offset', '0x000 (fixed)'],
            ['Movies Offset', '0xB60 (fixed)'],
            ['Counts Offset', '0xF31 (fixed)'],
        ];
        addFieldsToSection(section, fields);
        container.appendChild(section);
        
        // Show level summary
        const levelSection = createMetadataSection('Levels');
        const levelFields = blbFile.levels.map(l => [
            `${l.levelId}`,
            `"${l.name}" - Sectors ${l.sectorOffset}-${l.sectorOffset + l.sectorCount} (${l.byteSize} bytes)`
        ]);
        addFieldsToSection(levelSection, levelFields);
        container.appendChild(levelSection);
        
    } else if (currentView === 'hex') {
        renderHexView(container, 0, 0x100);
    } else if (currentView === 'binvis') {
        renderBinVis(container, 0, Math.min(blbFile.buffer.byteLength, 65536));
    }
}

function renderLevel(container, level) {
    if (currentView === 'fields') {
        const section = createMetadataSection('Level Entry Fields (0x70 bytes)');
        const fields = [
            ['Index', level.index],
            ['Level ID', level.levelId],
            ['Name', level.name],
            ['Entry Offset', `0x${level.offset.toString(16)}`],
            ['Sector Offset', level.sectorOffset],
            ['Sector Count', level.sectorCount],
            ['Byte Offset', `0x${level.byteOffset.toString(16)}`],
            ['Byte Size', `${level.byteSize} bytes`],
            ['Level Index (0x0C)', level.levelIndex],
            ['Level Flag (0x0D)', level.levelFlag],
            ['Tertiary Block Count', level.tertBlockCount],
            ['Entry1 Offset Lo', `0x${level.entry1OffsetLo.toString(16)}`],
            ['Segment Count', level.segments.length],
            ['Unknown 0x04', `0x${level.unknown_04.toString(16)}`, true],
            ['Unknown 0x06', `0x${level.unknown_06.toString(16)}`, true],
            ['Unknown 0x0A', `0x${level.unknown_0A.toString(16)}`, true],
        ];
        addFieldsToSection(section, fields);
        container.appendChild(section);
        
        // Tertiary blocks info
        if (level.tertOffsets && level.tertBlockCount > 0) {
            const tertSection = createMetadataSection('Tertiary Blocks (Stages)');
            const tertFields = [];
            for (let i = 0; i < 6; i++) {
                if (level.tertCounts[i] > 0) {
                    tertFields.push([
                        `Stage ${i}`,
                        `Sector ${level.tertOffsets[i]}, Count ${level.tertCounts[i]}`
                    ]);
                }
            }
            if (tertFields.length > 0) {
                addFieldsToSection(tertSection, tertFields);
                container.appendChild(tertSection);
            }
        }
        
        // Segment summary
        if (level.segments.length > 0) {
            const segSection = createMetadataSection('Container Assets');
            const segFields = level.segments.map(s => [
                `Asset ${s.typeId} (0x${s.typeId.toString(16)})`,
                `${s.typeName}: Offset 0x${s.absoluteOffset.toString(16)}, Size ${s.dataSize} bytes`
            ]);
            addFieldsToSection(segSection, segFields);
            container.appendChild(segSection);
        }
        
    } else if (currentView === 'hex') {
        renderHexView(container, level.offset, 0x70);
    } else if (currentView === 'binvis' && level.byteOffset > 0) {
        renderBinVis(container, level.byteOffset, Math.min(level.byteSize, 65536));
    } else if (currentView === 'render') {
        renderLevelGraphics(container, level);
    }
}

function renderContainer(container, nodeData) {
    const level = nodeData.data;
    const segments = nodeData.segments || [];
    const containerType = nodeData.containerType;
    
    if (currentView === 'fields') {
        const section = createMetadataSection(`${containerType === 'primary' ? 'Primary' : 'Secondary'} Container`);
        
        let fields = [];
        if (containerType === 'primary') {
            fields = [
                ['Sector Offset', level.sectorOffset],
                ['Sector Count', level.sectorCount],
                ['Byte Offset', `0x${level.byteOffset.toString(16)}`],
                ['Byte Size', `${level.byteSize.toLocaleString()} bytes`],
                ['Asset Count', segments.length],
            ];
        } else {
            fields = [
                ['Sector Offset', level.secBaseOffset],
                ['Sector Count', level.secBaseCount],
                ['Byte Offset', `0x${level.secBaseByteOffset.toString(16)}`],
                ['Byte Size', `${level.secBaseByteSize.toLocaleString()} bytes`],
                ['Asset Count', segments.length],
            ];
        }
        addFieldsToSection(section, fields);
        container.appendChild(section);
        
        // Asset list
        if (segments.length > 0) {
            const assetSection = createMetadataSection('Assets');
            const assetFields = segments.map(s => [
                `Asset ${s.typeId} (0x${s.typeId.toString(16)})`,
                `${s.typeName}: ${s.dataSize.toLocaleString()} bytes`
            ]);
            addFieldsToSection(assetSection, assetFields);
            container.appendChild(assetSection);
        }
        
    } else if (currentView === 'hex') {
        const offset = containerType === 'primary' ? level.byteOffset : level.secBaseByteOffset;
        renderHexView(container, offset, 256);
    } else if (currentView === 'binvis') {
        const offset = containerType === 'primary' ? level.byteOffset : level.secBaseByteOffset;
        const size = containerType === 'primary' ? level.byteSize : level.secBaseByteSize;
        renderBinVis(container, offset, Math.min(size, 65536));
    }
}

function renderStage(container, stage, level) {
    if (currentView === 'fields') {
        const section = createMetadataSection(`Stage ${stage.index}`);
        const fields = [
            ['Stage Index', stage.index],
            ['Sector Offset', stage.sectorOffset],
            ['Sector Count', stage.sectorCount],
            ['Byte Offset', `0x${stage.byteOffset.toString(16)}`],
            ['Byte Size', `${stage.byteSize.toLocaleString()} bytes (${Math.round(stage.byteSize / 1024)} KB)`],
            ['Asset Count', stage.segments ? stage.segments.length : 0],
        ];
        addFieldsToSection(section, fields);
        container.appendChild(section);
        
        // Stage sizing info
        const sizeSection = createMetadataSection('Stage Characteristics');
        const isBonus = stage.byteSize < 40 * 1024; // Bonus rooms are typically < 40KB
        const sizeFields = [
            ['Likely Type', isBonus ? 'Bonus Room (small)' : 'Full Stage'],
            ['Sprites', stage.segments ? stage.segments.filter(s => s.typeId === 0x258).length : 0],
            ['Layers', stage.segments ? stage.segments.filter(s => s.typeId === 0xC9).length : 0],
        ];
        addFieldsToSection(sizeSection, sizeFields);
        container.appendChild(sizeSection);
        
        // Asset list
        if (stage.segments && stage.segments.length > 0) {
            const assetSection = createMetadataSection('Assets');
            const assetFields = stage.segments.map(s => [
                `Asset ${s.typeId} (0x${s.typeId.toString(16)})`,
                `${s.typeName}: ${s.dataSize.toLocaleString()} bytes`
            ]);
            addFieldsToSection(assetSection, assetFields);
            container.appendChild(assetSection);
        }
        
    } else if (currentView === 'hex') {
        renderHexView(container, stage.byteOffset, 256);
    } else if (currentView === 'binvis') {
        renderBinVis(container, stage.byteOffset, Math.min(stage.byteSize, 65536));
    } else if (currentView === 'render') {
        renderStageGraphics(container, stage, level);
    }
}

function renderMovie(container, movie) {
    if (currentView === 'fields') {
        const section = createMetadataSection('Movie Entry Fields (0x1C bytes)');
        const fields = [
            ['Index', movie.index],
            ['Movie ID', movie.movieId],
            ['Short Name', movie.shortName],
            ['Filename', movie.filename],
            ['Sector Count', movie.sectorCount],
            ['Byte Size', `${movie.sectorCount * 2048} bytes`],
            ['Unknown 0x00', `0x${movie.unknown_00.toString(16)}`, true],
        ];
        addFieldsToSection(section, fields);
        container.appendChild(section);
    } else if (currentView === 'hex') {
        renderHexView(container, movie.offset, 0x1C);
    }
}

function renderSegment(container, segment, level) {
    if (currentView === 'fields') {
        const section = createMetadataSection('Container Asset Entry');
        const fields = [
            ['Asset ID', `${segment.typeId} (0x${segment.typeId.toString(16)})`],
            ['Type Name', segment.typeName],
            ['Data Offset (relative)', `0x${segment.dataOffset.toString(16)}`],
            ['Data Offset (absolute)', `0x${segment.absoluteOffset.toString(16)}`],
            ['Data Size', `${segment.dataSize} bytes`],
            ['Parsed Asset Count', segment.assets.length],
        ];
        addFieldsToSection(section, fields);
        container.appendChild(section);
        
        // Asset summary
        if (segment.assets.length > 0) {
            const assetSection = createMetadataSection('Assets');
            const assetFields = segment.assets.map((a, i) => [
                `Asset ${i}`,
                `${a.type} at 0x${a.offset.toString(16)}`
            ]);
            addFieldsToSection(assetSection, assetFields);
            container.appendChild(assetSection);
        }
        
    } else if (currentView === 'hex') {
        renderHexView(container, segment.absoluteOffset, Math.min(segment.dataSize, 512));
    } else if (currentView === 'binvis') {
        renderBinVis(container, segment.absoluteOffset, segment.dataSize);
    }
}

function renderAsset(container, asset, segment, level) {
    switch (asset.type) {
        case 'Sprite':
            renderSprite(container, asset);
            break;
        case 'Palette256':
        case 'LevelPalette':
            renderPalette(container, asset);
            break;
        case 'TileHeader':
            renderTileHeader(container, asset);
            break;
        case 'TilemapContainer':
            renderTilemapContainer(container, asset);
            break;
        case 'LayerEntry':
            renderLayerEntry(container, asset);
            break;
        case 'TilePixelData':
            renderTilePixelData(container, asset);
            break;
        case 'TilePaletteIndex':
            renderTilePaletteIndex(container, asset);
            break;
        case 'TileFlags':
            renderTileFlags(container, asset);
            break;
        case 'CollisionContainer':
            renderCollisionContainer(container, asset);
            break;
        case 'AudioData':
        case 'SPUSamples':
        case 'AnimationConfig':
            renderAudioAsset(container, asset);
            break;
        default:
            renderGenericAsset(container, asset);
    }
}

function renderSprite(container, sprite) {
    if (currentView === 'fields') {
        // Sprite header
        const headerSection = createMetadataSection('Sprite Header (12 bytes)');
        const headerFields = [
            ['Index', sprite.index],
            ['Sprite ID', sprite.spriteId],
            ['Offset', `0x${sprite.offset.toString(16)}`],
            ['Size', `${sprite.size} bytes`],
            ['Animation Count', sprite.animationCount],
            ['Frame Meta Offset', `0x${sprite.frameMetaOffset.toString(16)}`],
            ['RLE Offset', `0x${sprite.rleOffset.toString(16)}`],
            ['Palette Offset', `0x${sprite.paletteOffset.toString(16)}`],
            ['Total Frames', sprite.totalFrames],
        ];
        addFieldsToSection(headerSection, headerFields);
        container.appendChild(headerSection);
        
        // Animation entries
        if (sprite.animations.length > 0) {
            const animSection = createMetadataSection(`Animations (${sprite.animations.length}, 12 bytes each)`);
            const animGrid = document.createElement('div');
            animGrid.className = 'frame-grid';
            
            sprite.animations.forEach((anim, i) => {
                const card = document.createElement('div');
                card.className = 'frame-card';
                card.innerHTML = `
                    <div class="frame-header">Animation ${i}</div>
                    <div class="frame-details">
                        <div>ID: 0x${anim.animationId.toString(16)}</div>
                        <div>Frames: ${anim.frameCount}</div>
                        <div>Start Frame: ${anim.frameIndex}</div>
                        <div>Flags: 0x${anim.flags.toString(16)}</div>
                        <div>Extra: 0x${anim.extra.toString(16)}</div>
                    </div>
                `;
                animGrid.appendChild(card);
            });
            
            animSection.appendChild(animGrid);
            container.appendChild(animSection);
        }
        
        // Frame metadata
        if (sprite.frames.length > 0) {
            const framesSection = createMetadataSection(`Frame Metadata (${sprite.frames.length} frames, 36 bytes each)`);
            
            const frameGrid = document.createElement('div');
            frameGrid.className = 'frame-grid';
            
            sprite.frames.forEach(frame => {
                const card = document.createElement('div');
                card.className = 'frame-card';
                card.innerHTML = `
                    <div class="frame-header">Frame ${frame.index}</div>
                    <div class="frame-details">
                        <div>Size: ${frame.width} × ${frame.height}</div>
                        <div>Render Pos: (${frame.renderX}, ${frame.renderY})</div>
                        <div>Anchor: (${frame.anchorX}, ${frame.anchorY})</div>
                        <div>Clip: ${frame.clipWidth} × ${frame.clipHeight}</div>
                        <div>RLE Offset: 0x${frame.rleOffset.toString(16)}</div>
                        <div style="color: var(--accent-red);">
                            flags: 0x${frame.flags.toString(16)}
                        </div>
                    </div>
                `;
                frameGrid.appendChild(card);
            });
            
            framesSection.appendChild(frameGrid);
            container.appendChild(framesSection);
        }
        
    } else if (currentView === 'hex') {
        renderHexView(container, sprite.offset, Math.min(sprite.size, 512));
    } else if (currentView === 'render') {
        const renderSection = createMetadataSection('Sprite Rendering');
        renderSection.innerHTML += `
            <p style="color: var(--text-secondary); margin-bottom: 15px;">
                RLE decoding not yet implemented. Frame dimensions shown below.
            </p>
        `;
        
        const renderGrid = document.createElement('div');
        renderGrid.className = 'frame-grid';
        
        sprite.frames.forEach(frame => {
            const card = document.createElement('div');
            card.className = 'render-item';
            
            // Create placeholder canvas with frame size
            const canvas = document.createElement('canvas');
            const scale = 2;
            canvas.width = Math.max(frame.width, 16) * scale;
            canvas.height = Math.max(frame.height, 16) * scale;
            canvas.style.width = canvas.width + 'px';
            canvas.style.height = canvas.height + 'px';
            
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#333';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#666';
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#888';
            ctx.font = '12px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(`${frame.width}×${frame.height}`, canvas.width/2, canvas.height/2);
            
            card.appendChild(canvas);
            card.innerHTML += `<div class="render-label">Frame ${frame.index}</div>`;
            renderGrid.appendChild(card);
        });
        
        renderSection.appendChild(renderGrid);
        container.appendChild(renderSection);
    }
}

function renderPalette(container, palette) {
    const isLevelPalette = palette.type === 'LevelPalette';
    const colorCount = palette.colors ? palette.colors.length : 0;
    
    if (currentView === 'fields') {
        const title = isLevelPalette 
            ? 'Level Palette (Asset 602)' 
            : `Palette ${palette.index !== undefined ? palette.index : ''}`;
        const section = createMetadataSection(title);
        const fields = [
            ['Type', isLevelPalette ? 'Level Palette (602)' : 'Sprite Palette (256 color)'],
            ['Offset', `0x${palette.offset.toString(16)}`],
            ['Size', `${palette.size || colorCount * 2} bytes`],
            ['Color Count', colorCount],
        ];
        if (palette.index !== undefined) {
            fields.splice(0, 0, ['Index', palette.index]);
        }
        addFieldsToSection(section, fields);
        
        // Color grid
        const colorSection = document.createElement('div');
        colorSection.style.marginTop = '15px';
        colorSection.innerHTML = '<h4 style="color: var(--accent-purple); margin-bottom: 10px;">Colors</h4>';
        
        const grid = document.createElement('div');
        grid.className = 'palette-grid';
        grid.style.gridTemplateColumns = `repeat(${isLevelPalette ? 16 : Math.min(colorCount, 16)}, 24px)`;
        
        palette.colors.forEach((color, i) => {
            const cell = document.createElement('div');
            cell.className = 'palette-color';
            cell.style.background = `rgb(${color.r}, ${color.g}, ${color.b})`;
            cell.title = `Color ${i}: R=${color.r} G=${color.g} B=${color.b} (0x${color.raw.toString(16).padStart(4, '0')})`;
            grid.appendChild(cell);
        });
        
        colorSection.appendChild(grid);
        section.appendChild(colorSection);
        container.appendChild(section);
        
    } else if (currentView === 'hex') {
        renderHexView(container, palette.offset, Math.min(colorCount * 2, 512));
    } else if (currentView === 'render') {
        const section = createMetadataSection('Palette Visualization');
        
        // Display as 16xN grid for 256-color palettes
        const cols = isLevelPalette ? 16 : Math.min(colorCount, 16);
        const rows = Math.ceil(colorCount / cols);
        
        const canvas = document.createElement('canvas');
        canvas.width = cols * 16;
        canvas.height = Math.max(rows * 16, 32);
        canvas.style.imageRendering = 'pixelated';
        canvas.style.border = '1px solid #666';
        
        const ctx = canvas.getContext('2d');
        palette.colors.forEach((color, i) => {
            const x = (i % cols) * 16;
            const y = Math.floor(i / cols) * 16;
            ctx.fillStyle = `rgb(${color.r}, ${color.g}, ${color.b})`;
            ctx.fillRect(x, y, 16, 16);
        });
        
        section.appendChild(canvas);
        container.appendChild(section);
    }
}

        const totalTiles = tile.count16x16 + tile.count8x8a + tile.count8x8b;

    if (currentView === 'fields') {
        const section = createMetadataSection('Collision Container (Asset 601)');
        const fields = [
            ['Offset', `0x${asset.offset.toString(16)}`],
            ['Size', `${asset.size} bytes`],
            ['Entry Count', asset.entryCount],
        ];
        addFieldsToSection(section, fields);
        
        if (asset.entries.length > 0) {
            const entrySection = createMetadataSection('Sub-entries');
            const entryFields = asset.entries.map((e, i) => [
                `Entry ${i}`,
                `ID: ${e.id}, Size: ${e.size}, Offset: 0x${e.offset.toString(16)}`
            ]);
            addFieldsToSection(entrySection, entryFields);
            container.appendChild(entrySection);
        }
        container.appendChild(section);
    } else if (currentView === 'hex') {
        renderHexView(container, asset.offset, Math.min(asset.size, 512));
    } else if (currentView === 'binvis') {
        renderBinVis(container, asset.offset, Math.min(asset.size, 65536));
    }
}

function renderAudioAsset(container, asset) {
    if (currentView === 'fields') {
        const section = createMetadataSection(asset.typeName || asset.type);
        const fields = [
            ['Type', asset.typeName || asset.type],
            ['Offset', `0x${asset.offset.toString(16)}`],
            ['Size', `${asset.size} bytes`],
        ];
        addFieldsToSection(section, fields);
        container.appendChild(section);
    } else if (currentView === 'hex') {
        renderHexView(container, asset.offset, Math.min(asset.size, 256));
    } else if (currentView === 'binvis') {
        renderBinVis(container, asset.offset, Math.min(asset.size, 65536));
    }
}

function renderGenericAsset(container, asset) {
    if (currentView === 'fields') {
        const section = createMetadataSection(asset.typeName || asset.type);
        const fields = [
            ['Type', asset.typeName || asset.type],
            ['Offset', `0x${asset.offset.toString(16)}`],
            ['Size', `${asset.size} bytes`],
        ];
        addFieldsToSection(section, fields);
        container.appendChild(section);
    } else if (currentView === 'hex') {
        renderHexView(container, asset.offset, Math.min(asset.size, 512));
    }
}

// Helper Functions
