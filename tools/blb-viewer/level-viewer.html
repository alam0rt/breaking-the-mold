<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLB Level Viewer - Skullmonkeys</title>
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --bg-panel: #16213e;
            --bg-hover: #0f3460;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0a0;
            --accent: #e94560;
            --accent-dim: #533a3e;
            --border: #2a2a4a;
            --success: #4caf50;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        header {
            background: var(--bg-panel);
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-shrink: 0;
        }
        
        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent);
        }
        
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        
        .btn:hover {
            background: #ff6b6b;
        }
        
        .btn:disabled {
            background: #666;
            cursor: not-allowed;
        }
        
        #file-input {
            display: none;
        }
        
        #file-info {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        /* Level Selection Panel */
        .sidebar {
            width: 280px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .sidebar-header {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }
        
        .level-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        
        .level-item {
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }
        
        .level-item:hover {
            background: var(--bg-hover);
        }
        
        .level-item.selected {
            background: var(--accent-dim);
            border-left: 3px solid var(--accent);
        }
        
        .level-id {
            font-weight: 600;
            color: var(--accent);
            font-family: monospace;
        }
        
        .level-name {
            flex: 1;
            margin-left: 0.5rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .stage-count {
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: var(--bg-dark);
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
        }
        
        /* Stage Selection */
        .stage-selector {
            padding: 0.75rem 1rem;
            border-top: 1px solid var(--border);
            background: var(--bg-dark);
        }
        
        .stage-selector label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 0.5rem;
        }
        
        .stage-buttons {
            display: flex;
            gap: 0.25rem;
            flex-wrap: wrap;
        }
        
        .stage-btn {
            background: var(--bg-panel);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 0.3rem 0.6rem;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .stage-btn:hover {
            background: var(--bg-hover);
        }
        
        .stage-btn.active {
            background: var(--accent);
            border-color: var(--accent);
        }
        
        .stage-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        /* Viewport */
        .viewport-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .viewport-toolbar {
            background: var(--bg-panel);
            padding: 0.5rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        
        .viewport-toolbar label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .viewport-toolbar select,
        .viewport-toolbar input[type="range"] {
            background: var(--bg-dark);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 0.25rem 0.5rem;
            border-radius: 3px;
            font-size: 0.8rem;
        }
        
        .viewport-toolbar input[type="checkbox"] {
            margin-right: 0.25rem;
        }
        
        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .toolbar-separator {
            width: 1px;
            height: 20px;
            background: var(--border);
        }
        
        .zoom-value {
            font-family: monospace;
            font-size: 0.8rem;
            min-width: 3em;
        }
        
        .viewport-info {
            margin-left: auto;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-family: monospace;
        }
        
        .viewport {
            flex: 1;
            overflow: auto;
            background: #000;
            position: relative;
        }
        
        #level-canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            transform-origin: 0 0;
        }
        
        /* Layer Controls */
        .layer-panel {
            width: 220px;
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .layer-panel-header {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }
        
        .layer-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        
        .layer-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.5rem;
            border-radius: 3px;
            font-size: 0.8rem;
            margin-bottom: 2px;
        }
        
        .layer-item:hover {
            background: var(--bg-hover);
        }
        
        .layer-item input[type="checkbox"] {
            margin: 0;
        }
        
        .layer-item label {
            flex: 1;
            cursor: pointer;
        }
        
        .layer-info {
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-family: monospace;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
            z-index: 100;
        }
        
        .loading-overlay.hidden {
            display: none;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        /* Empty state */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            text-align: center;
            padding: 2rem;
        }
        
        .empty-state h2 {
            font-size: 1.25rem;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        
        .empty-state p {
            font-size: 0.9rem;
            max-width: 400px;
        }
        
        /* Status bar */
        .status-bar {
            background: var(--bg-panel);
            padding: 0.4rem 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            gap: 2rem;
            flex-shrink: 0;
        }
        
        .status-item {
            display: flex;
            gap: 0.5rem;
        }
        
        .status-label {
            color: var(--text-secondary);
        }
        
        .status-value {
            color: var(--text-primary);
            font-family: monospace;
        }
    </style>
</head>
<body>
    <header>
        <h1>🎮 BLB Level Viewer</h1>
        <label class="btn" for="file-input">Open BLB File</label>
        <input type="file" id="file-input" accept=".blb,.BLB">
        <span id="file-info">No file loaded</span>
    </header>
    
    <div class="main-container">
        <!-- Level Selection Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">Levels</div>
            <div class="level-list" id="level-list">
                <div class="empty-state" style="padding: 2rem 1rem;">
                    <p>Load a BLB file to view levels</p>
                </div>
            </div>
            <div class="stage-selector" id="stage-selector" style="display: none;">
                <label>Stage:</label>
                <div class="stage-buttons" id="stage-buttons"></div>
            </div>
        </aside>
        
        <!-- Main Viewport -->
        <main class="viewport-container">
            <div class="viewport-toolbar" id="viewport-toolbar" style="display: none;">
                <div class="toolbar-group">
                    <label>Zoom:</label>
                    <input type="range" id="zoom-slider" min="0.25" max="4" step="0.25" value="1">
                    <span class="zoom-value" id="zoom-value">100%</span>
                </div>
                
                <div class="toolbar-separator"></div>
                
                <div class="toolbar-group">
                    <label><input type="checkbox" id="show-grid"> Grid</label>
                </div>
                
                <div class="toolbar-group">
                    <label><input type="checkbox" id="animate-parallax"> Animate Parallax</label>
                </div>
                
                <div class="viewport-info" id="viewport-info"></div>
            </div>
            
            <div class="viewport" id="viewport">
                <div class="empty-state" id="empty-state">
                    <h2>No Level Selected</h2>
                    <p>Select a level from the list to render its graphics. Use the layer panel to toggle individual layers.</p>
                </div>
                <canvas id="level-canvas" style="display: none;"></canvas>
                <div class="loading-overlay hidden" id="loading-overlay">
                    <div class="spinner"></div>
                    <div class="loading-text" id="loading-text">Loading...</div>
                </div>
            </div>
        </main>
        
        <!-- Layer Controls -->
        <aside class="layer-panel" id="layer-panel" style="display: none;">
            <div class="layer-panel-header">Layers</div>
            <div class="layer-list" id="layer-list"></div>
        </aside>
    </div>
    
    <div class="status-bar" id="status-bar">
        <div class="status-item">
            <span class="status-label">Level:</span>
            <span class="status-value" id="status-level">-</span>
        </div>
        <div class="status-item">
            <span class="status-label">Size:</span>
            <span class="status-value" id="status-size">-</span>
        </div>
        <div class="status-item">
            <span class="status-label">Tiles:</span>
            <span class="status-value" id="status-tiles">-</span>
        </div>
        <div class="status-item">
            <span class="status-label">Layers:</span>
            <span class="status-value" id="status-layers">-</span>
        </div>
        <div class="status-item">
            <span class="status-label">Mouse:</span>
            <span class="status-value" id="status-mouse">-</span>
        </div>
    </div>

<script>
// ============================================================================
// Constants
// ============================================================================

const SECTOR_SIZE = 2048;
const HEADER_SIZE = 4096;
const LEVEL_ENTRY_SIZE = 0x70;

// Asset IDs
const ASSET_TILE_HEADER = 100;      // 0x64 - Tile counts
const ASSET_TILE_PIXELS = 300;      // 0x12C - Raw pixel data
const ASSET_TILE_PALETTES_IDX = 301; // 0x12D - Palette index per tile
const ASSET_TILE_FLAGS = 302;       // 0x12E - Tile size flags
const ASSET_PALETTES = 400;         // 0x190 - Palette container

const ASSET_TERT_HEADER = 100;      // 0x64 - Level header
const ASSET_TILEMAPS = 200;         // 0xC8 - Tilemap container
const ASSET_LAYERS = 201;           // 0xC9 - Layer entries

// ============================================================================
// BLB Parser
// ============================================================================

class BLBFile {
    constructor(arrayBuffer) {
        this.buffer = arrayBuffer;
        this.data = new Uint8Array(arrayBuffer);
        this.view = new DataView(arrayBuffer);
        
        // Parse header counts
        this.levelCount = this.data[0xF31];
        this.assetCount = this.data[0xF32];
        
        // Parse levels
        this.levels = [];
        for (let i = 0; i < this.levelCount; i++) {
            this.levels.push(this.parseLevelEntry(i));
        }
    }
    
    parseLevelEntry(index) {
        const offset = index * LEVEL_ENTRY_SIZE;
        
        // Read level ID (4 chars at offset 0x56)
        let levelId = '';
        for (let i = 0; i < 4; i++) {
            const c = this.data[offset + 0x56 + i];
            if (c === 0) break;
            levelId += String.fromCharCode(c);
        }
        
        // Read level name (at offset 0x5B)
        let name = '';
        for (let i = 0; i < 20; i++) {
            const c = this.data[offset + 0x5B + i];
            if (c === 0) break;
            name += String.fromCharCode(c);
        }
        
        // Read secondary sub-block offsets (5× u16 at +0x20)
        const secSubOffsets = [];
        const secSubCounts = [];
        for (let i = 0; i < 5; i++) {
            secSubOffsets.push(this.view.getUint16(offset + 0x20 + i * 2, true));
            secSubCounts.push(this.view.getUint16(offset + 0x2E + i * 2, true));
        }
        
        // Read tertiary sub-block info (6 slots)
        const tertOffsets = [];
        const tertCounts = [];
        for (let i = 0; i < 6; i++) {
            tertOffsets.push(this.view.getUint16(offset + 0x3A + i * 2, true));
            tertCounts.push(this.view.getUint16(offset + 0x48 + i * 2, true));
        }
        
        return {
            index,
            levelId,
            name,
            primarySectorOffset: this.view.getUint16(offset + 0x00, true),
            primarySectorCount: this.view.getUint16(offset + 0x02, true),
            secondarySectorOffset: this.view.getUint16(offset + 0x1E, true),
            secondarySectorCount: this.view.getUint16(offset + 0x2C, true),
            secSubOffsets,
            secSubCounts,
            tertiaryBlockCount: this.view.getUint16(offset + 0x0E, true),
            tertOffsets,
            tertCounts,
        };
    }
    
    // Read raw segment data
    readSegment(sectorOffset, sectorCount) {
        const byteOffset = sectorOffset * SECTOR_SIZE;
        const byteLength = sectorCount * SECTOR_SIZE;
        
        if (byteOffset + byteLength > this.data.length) {
            return null;
        }
        
        return this.data.slice(byteOffset, byteOffset + byteLength);
    }
    
    // Parse TOC structure
    parseTOC(segmentData) {
        if (!segmentData || segmentData.length < 4) return {};
        
        const view = new DataView(segmentData.buffer, segmentData.byteOffset);
        const count = view.getUint32(0, true);
        
        if (count > 100 || count * 12 + 4 > segmentData.length) {
            return {};
        }
        
        const assets = {};
        for (let i = 0; i < count; i++) {
            const entryOffset = 4 + i * 12;
            const assetId = view.getUint32(entryOffset + 0, true);
            const size = view.getUint32(entryOffset + 4, true);
            const dataOffset = view.getUint32(entryOffset + 8, true);
            
            if (dataOffset + size <= segmentData.length) {
                assets[assetId] = segmentData.slice(dataOffset, dataOffset + size);
            }
        }
        
        return assets;
    }
    
    // Get stage count for a level
    getStageCount(level) {
        let count = 0;
        for (let i = 0; i < 6; i++) {
            if (level.tertCounts[i] > 0) count++;
        }
        return count;
    }
}

// ============================================================================
// Palette Parser
// ============================================================================

function parsePaletteRGBA(data, numColors = 256) {
    const colors = [];
    const maxColors = Math.min(numColors, Math.floor(data.length / 2));
    
    for (let i = 0; i < maxColors; i++) {
        const color = data[i * 2] | (data[i * 2 + 1] << 8);
        const r = ((color & 0x1F) * 255 / 31) | 0;
        const g = (((color >> 5) & 0x1F) * 255 / 31) | 0;
        const b = (((color >> 10) & 0x1F) * 255 / 31) | 0;
        const a = (i > 0 || (color & 0x8000)) ? 255 : 0;
        colors.push([r, g, b, a]);
    }
    
    // Pad to requested size
    while (colors.length < numColors) {
        colors.push([0, 0, 0, 0]);
    }
    
    return colors;
}

function parsePaletteContainer(asset400Data) {
    if (!asset400Data || asset400Data.length < 4) return [];
    
    const view = new DataView(asset400Data.buffer, asset400Data.byteOffset);
    const count = view.getUint32(0, true);
    
    if (count > 50) return [];
    
    const palettes = [];
    for (let i = 0; i < count; i++) {
        const entryOffset = 4 + i * 12;
        if (entryOffset + 12 > asset400Data.length) break;
        
        const size = view.getUint32(entryOffset + 4, true);
        const dataOffset = view.getUint32(entryOffset + 8, true);
        
        if (dataOffset + size <= asset400Data.length && size >= 512) {
            palettes.push(parsePaletteRGBA(asset400Data.slice(dataOffset, dataOffset + size)));
        } else {
            // Fallback grayscale
            palettes.push(Array.from({length: 256}, (_, i) => [i, i, i, i > 0 ? 255 : 0]));
        }
    }
    
    return palettes;
}

// ============================================================================
// Tile Extraction
// ============================================================================

function extractTiles(secAssets) {
    const headerData = secAssets[ASSET_TILE_HEADER];
    const pixelData = secAssets[ASSET_TILE_PIXELS];
    const palIndices = secAssets[ASSET_TILE_PALETTES_IDX];
    const flagsData = secAssets[ASSET_TILE_FLAGS];
    const paletteData = secAssets[ASSET_PALETTES];
    
    if (!headerData || !pixelData || !palIndices || !paletteData) {
        console.warn('Missing required tile assets');
        return [];
    }
    
    // Parse header
    const view = new DataView(headerData.buffer, headerData.byteOffset);
    const count16x16 = view.getUint16(0x10, true);
    const count8x8 = view.getUint16(0x12, true);
    const totalTiles = count16x16 + count8x8;
    
    // Parse palettes
    const palettes = parsePaletteContainer(paletteData);
    if (palettes.length === 0) {
        console.warn('No palettes found');
        return [];
    }
    
    // Extract tiles as ImageData objects (all scaled to 16x16)
    const tiles = [];
    
    for (let i = 0; i < totalTiles; i++) {
        // Determine tile size
        let is8x8 = false;
        if (flagsData && i < flagsData.length) {
            is8x8 = (flagsData[i] & 0x02) !== 0;
        } else {
            is8x8 = (i >= count16x16);
        }
        
        // Get palette
        const palIdx = palIndices[i] || 0;
        const palette = palettes[palIdx] || palettes[0];
        
        // Calculate offsets
        let tileOffset, tileSize, stride;
        if (is8x8) {
            tileOffset = count16x16 * 256 + (i - count16x16) * 128;
            tileSize = 8;
            stride = 16;
        } else {
            tileOffset = i * 256;
            tileSize = 16;
            stride = 16;
        }
        
        // Create 16x16 ImageData (scale 8x8 tiles)
        const imageData = new ImageData(16, 16);
        const scale = is8x8 ? 2 : 1;
        
        for (let y = 0; y < tileSize; y++) {
            for (let x = 0; x < tileSize; x++) {
                const pixOff = tileOffset + y * stride + x;
                if (pixOff >= pixelData.length) continue;
                
                const colorIdx = pixelData[pixOff];
                const color = palette[colorIdx] || [0, 0, 0, 0];
                
                // Apply scaling for 8x8 tiles
                for (let sy = 0; sy < scale; sy++) {
                    for (let sx = 0; sx < scale; sx++) {
                        const destX = x * scale + sx;
                        const destY = y * scale + sy;
                        const idx = (destY * 16 + destX) * 4;
                        imageData.data[idx] = color[0];
                        imageData.data[idx + 1] = color[1];
                        imageData.data[idx + 2] = color[2];
                        imageData.data[idx + 3] = color[3];
                    }
                }
            }
        }
        
        tiles.push(imageData);
    }
    
    return tiles;
}

// ============================================================================
// Layer/Tilemap Parsing
// ============================================================================

function parseLayerEntries(asset201Data) {
    if (!asset201Data) return [];
    
    const entries = [];
    const numLayers = Math.floor(asset201Data.length / 92);
    const view = new DataView(asset201Data.buffer, asset201Data.byteOffset);
    
    for (let i = 0; i < numLayers; i++) {
        const offset = i * 92;
        
        entries.push({
            index: i,
            xOffset: view.getInt16(offset + 0x00, true),
            yOffset: view.getInt16(offset + 0x02, true),
            width: view.getUint16(offset + 0x04, true),
            height: view.getUint16(offset + 0x06, true),
            levelWidth: view.getUint16(offset + 0x08, true),
            levelHeight: view.getUint16(offset + 0x0A, true),
            scrollX: view.getUint32(offset + 0x10, true),
            scrollY: view.getUint32(offset + 0x14, true),
            layerType: asset201Data[offset + 0x26] || 0,
        });
    }
    
    return entries;
}

function parseTilemapContainer(asset200Data) {
    if (!asset200Data || asset200Data.length < 4) return [];
    
    const view = new DataView(asset200Data.buffer, asset200Data.byteOffset);
    const count = view.getUint32(0, true);
    
    if (count > 50) return [];
    
    const tilemaps = [];
    for (let i = 0; i < count; i++) {
        const entryOffset = 4 + i * 12;
        if (entryOffset + 12 > asset200Data.length) break;
        
        const size = view.getUint32(entryOffset + 4, true);
        const dataOffset = view.getUint32(entryOffset + 8, true);
        
        if (dataOffset + size <= asset200Data.length) {
            // Parse as array of u16
            const tilemapData = asset200Data.slice(dataOffset, dataOffset + size);
            const tilemapView = new DataView(tilemapData.buffer, tilemapData.byteOffset);
            const tiles = [];
            for (let j = 0; j < size / 2; j++) {
                tiles.push(tilemapView.getUint16(j * 2, true));
            }
            tilemaps.push(tiles);
        } else {
            tilemaps.push([]);
        }
    }
    
    return tilemaps;
}

function getTileIndex(tileVal) {
    const idx = tileVal & 0x7FF;  // Lower 11 bits, 1-based
    return idx > 0 ? idx - 1 : -1;
}

// ============================================================================
// Level Renderer
// ============================================================================

class LevelRenderer {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.tiles = [];
        this.layers = [];
        this.tilemaps = [];
        this.levelWidth = 0;
        this.levelHeight = 0;
        this.bgColor = [0, 0, 0];
        this.layerVisibility = [];
        this.zoom = 1;
        this.showGrid = false;
        
        // Pre-render layer canvases for performance
        this.layerCanvases = [];
    }
    
    setData(tiles, layers, tilemaps, levelWidth, levelHeight, bgColor) {
        this.tiles = tiles;
        this.layers = layers;
        this.tilemaps = tilemaps;
        this.levelWidth = levelWidth;
        this.levelHeight = levelHeight;
        this.bgColor = bgColor;
        
        // Initialize visibility
        this.layerVisibility = layers.map(() => true);
        
        // Pre-render each layer
        this.prerenderLayers();
    }
    
    prerenderLayers() {
        this.layerCanvases = [];
        
        for (let layerIdx = 0; layerIdx < this.layers.length; layerIdx++) {
            const layer = this.layers[layerIdx];
            const tilemap = this.tilemaps[layerIdx] || [];
            
            // Calculate layer bounds
            const canvasWidth = layer.width * 16;
            const canvasHeight = layer.height * 16;
            
            if (canvasWidth <= 0 || canvasHeight <= 0) {
                this.layerCanvases.push(null);
                continue;
            }
            
            // Create layer canvas
            const layerCanvas = document.createElement('canvas');
            layerCanvas.width = canvasWidth;
            layerCanvas.height = canvasHeight;
            const layerCtx = layerCanvas.getContext('2d');
            
            // Render tiles
            for (let y = 0; y < layer.height; y++) {
                for (let x = 0; x < layer.width; x++) {
                    const idx = y * layer.width + x;
                    if (idx >= tilemap.length) continue;
                    
                    const tileVal = tilemap[idx];
                    if (tileVal === 0) continue;
                    
                    const tileIdx = getTileIndex(tileVal);
                    if (tileIdx < 0 || tileIdx >= this.tiles.length) continue;
                    
                    const tileData = this.tiles[tileIdx];
                    layerCtx.putImageData(tileData, x * 16, y * 16);
                }
            }
            
            this.layerCanvases.push({
                canvas: layerCanvas,
                xOffset: layer.xOffset,
                yOffset: layer.yOffset,
                scrollX: layer.scrollX,
                scrollY: layer.scrollY,
            });
        }
    }
    
    render(scrollOffset = 0) {
        const width = this.levelWidth * 16;
        const height = this.levelHeight * 16;
        
        if (width <= 0 || height <= 0) return;
        
        // Set canvas size
        this.canvas.width = width;
        this.canvas.height = height;
        this.canvas.style.transform = `scale(${this.zoom})`;
        
        // Clear with background color
        this.ctx.fillStyle = `rgb(${this.bgColor[0]}, ${this.bgColor[1]}, ${this.bgColor[2]})`;
        this.ctx.fillRect(0, 0, width, height);
        
        // Render each visible layer (back to front)
        for (let i = 0; i < this.layerCanvases.length; i++) {
            if (!this.layerVisibility[i]) continue;
            
            const layerData = this.layerCanvases[i];
            if (!layerData) continue;
            
            // Calculate parallax offset
            let px = layerData.xOffset * 16;
            let py = layerData.yOffset * 16;
            
            // Apply parallax scrolling if scroll factors are set
            if (layerData.scrollX !== 0x10000 && layerData.scrollX !== 0) {
                const factor = layerData.scrollX / 0x10000;
                px -= scrollOffset * (1 - factor);
            }
            
            this.ctx.drawImage(layerData.canvas, px, py);
        }
        
        // Draw grid overlay if enabled
        if (this.showGrid) {
            this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            this.ctx.lineWidth = 1;
            
            for (let x = 0; x <= width; x += 16) {
                this.ctx.beginPath();
                this.ctx.moveTo(x, 0);
                this.ctx.lineTo(x, height);
                this.ctx.stroke();
            }
            
            for (let y = 0; y <= height; y += 16) {
                this.ctx.beginPath();
                this.ctx.moveTo(0, y);
                this.ctx.lineTo(width, y);
                this.ctx.stroke();
            }
        }
    }
    
    setLayerVisibility(index, visible) {
        if (index >= 0 && index < this.layerVisibility.length) {
            this.layerVisibility[index] = visible;
            this.render();
        }
    }
    
    setZoom(zoom) {
        this.zoom = zoom;
        this.render();
    }
    
    setShowGrid(show) {
        this.showGrid = show;
        this.render();
    }
}

// ============================================================================
// Application
// ============================================================================

let currentBlb = null;
let renderer = null;
let selectedLevelIdx = -1;
let selectedStageIdx = 0;
let animationFrame = null;
let scrollOffset = 0;

function init() {
    const canvas = document.getElementById('level-canvas');
    renderer = new LevelRenderer(canvas);
    
    // File input
    document.getElementById('file-input').addEventListener('change', handleFileLoad);
    
    // Zoom control
    const zoomSlider = document.getElementById('zoom-slider');
    zoomSlider.addEventListener('input', () => {
        const zoom = parseFloat(zoomSlider.value);
        document.getElementById('zoom-value').textContent = `${Math.round(zoom * 100)}%`;
        if (renderer) {
            renderer.setZoom(zoom);
        }
    });
    
    // Grid toggle
    document.getElementById('show-grid').addEventListener('change', (e) => {
        if (renderer) {
            renderer.setShowGrid(e.target.checked);
        }
    });
    
    // Parallax animation
    document.getElementById('animate-parallax').addEventListener('change', (e) => {
        if (e.target.checked) {
            startParallaxAnimation();
        } else {
            stopParallaxAnimation();
        }
    });
    
    // Mouse position tracking
    const viewport = document.getElementById('viewport');
    viewport.addEventListener('mousemove', (e) => {
        if (!renderer || renderer.levelWidth === 0) return;
        
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / renderer.zoom);
        const y = Math.floor((e.clientY - rect.top) / renderer.zoom);
        const tileX = Math.floor(x / 16);
        const tileY = Math.floor(y / 16);
        
        document.getElementById('status-mouse').textContent = 
            `${x}, ${y} (tile ${tileX}, ${tileY})`;
    });
}

async function handleFileLoad(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    showLoading('Loading BLB file...');
    
    try {
        const arrayBuffer = await file.arrayBuffer();
        currentBlb = new BLBFile(arrayBuffer);
        
        document.getElementById('file-info').textContent = 
            `${file.name} - ${currentBlb.levelCount} levels`;
        
        populateLevelList();
        hideLoading();
        
    } catch (err) {
        hideLoading();
        alert('Error loading BLB file: ' + err.message);
        console.error(err);
    }
}

function populateLevelList() {
    const listEl = document.getElementById('level-list');
    listEl.innerHTML = '';
    
    for (const level of currentBlb.levels) {
        const stageCount = currentBlb.getStageCount(level);
        if (stageCount === 0) continue;  // Skip levels with no stages
        
        const item = document.createElement('div');
        item.className = 'level-item';
        item.innerHTML = `
            <span class="level-id">${level.levelId}</span>
            <span class="level-name">${level.name}</span>
            <span class="stage-count">${stageCount}</span>
        `;
        item.addEventListener('click', () => selectLevel(level.index));
        listEl.appendChild(item);
    }
}

function selectLevel(levelIdx) {
    selectedLevelIdx = levelIdx;
    selectedStageIdx = 0;
    
    // Update UI selection
    const items = document.querySelectorAll('.level-item');
    items.forEach((item, idx) => {
        const level = currentBlb.levels.find(l => 
            currentBlb.getStageCount(l) > 0 && 
            Array.from(items).indexOf(item) === currentBlb.levels.filter(l2 => 
                currentBlb.getStageCount(l2) > 0 && l2.index <= l.index
            ).length - 1
        );
        item.classList.toggle('selected', 
            currentBlb.levels[levelIdx] && 
            item.querySelector('.level-id').textContent === currentBlb.levels[levelIdx].levelId
        );
    });
    
    // Simpler approach - find by level ID
    document.querySelectorAll('.level-item').forEach(item => {
        const id = item.querySelector('.level-id').textContent;
        item.classList.toggle('selected', id === currentBlb.levels[levelIdx].levelId);
    });
    
    // Update stage buttons
    updateStageButtons();
    
    // Load stage
    loadStage();
}

function updateStageButtons() {
    const level = currentBlb.levels[selectedLevelIdx];
    const stageCount = currentBlb.getStageCount(level);
    
    const container = document.getElementById('stage-buttons');
    container.innerHTML = '';
    
    let stageNum = 0;
    for (let i = 0; i < 6; i++) {
        if (level.tertCounts[i] > 0) {
            const btn = document.createElement('button');
            btn.className = 'stage-btn' + (i === selectedStageIdx ? ' active' : '');
            btn.textContent = `Stage ${stageNum}`;
            btn.dataset.index = i;
            btn.addEventListener('click', () => {
                selectedStageIdx = i;
                updateStageButtons();
                loadStage();
            });
            container.appendChild(btn);
            stageNum++;
        }
    }
    
    document.getElementById('stage-selector').style.display = stageCount > 1 ? 'block' : 'none';
}

async function loadStage() {
    if (selectedLevelIdx < 0 || !currentBlb) return;
    
    showLoading('Extracting tiles...');
    
    // Use setTimeout to allow UI update
    await new Promise(resolve => setTimeout(resolve, 10));
    
    try {
        const level = currentBlb.levels[selectedLevelIdx];
        
        // Determine which secondary to use
        // Stage 0 uses base secondary, Stage N uses secondary sub-block (N-1)
        let secData;
        if (selectedStageIdx === 0 || true) {  // For now, always use base secondary
            secData = currentBlb.readSegment(level.secondarySectorOffset, level.secondarySectorCount);
        }
        // TODO: Handle secondary sub-blocks for stages > 0
        
        if (!secData) {
            throw new Error('Failed to read secondary data');
        }
        
        // Parse secondary TOC
        const secAssets = currentBlb.parseTOC(secData);
        
        showLoading('Parsing tiles...');
        await new Promise(resolve => setTimeout(resolve, 10));
        
        // Extract tiles
        const tiles = extractTiles(secAssets);
        if (tiles.length === 0) {
            throw new Error('No tiles extracted');
        }
        
        showLoading('Loading stage data...');
        await new Promise(resolve => setTimeout(resolve, 10));
        
        // Read tertiary data for selected stage
        const tertData = currentBlb.readSegment(
            level.tertOffsets[selectedStageIdx],
            level.tertCounts[selectedStageIdx]
        );
        
        if (!tertData) {
            throw new Error('Failed to read tertiary data');
        }
        
        const tertAssets = currentBlb.parseTOC(tertData);
        
        // Parse tertiary header for level dimensions
        const headerData = tertAssets[ASSET_TERT_HEADER];
        if (!headerData || headerData.length < 12) {
            throw new Error('Invalid tertiary header');
        }
        
        const headerView = new DataView(headerData.buffer, headerData.byteOffset);
        const bgR = headerData[0];
        const bgG = headerData[1];
        const bgB = headerData[2];
        const levelWidth = headerView.getUint16(0x08, true);
        const levelHeight = headerView.getUint16(0x0A, true);
        
        showLoading('Parsing layers...');
        await new Promise(resolve => setTimeout(resolve, 10));
        
        // Parse layers and tilemaps
        const layers = parseLayerEntries(tertAssets[ASSET_LAYERS]);
        const tilemaps = parseTilemapContainer(tertAssets[ASSET_TILEMAPS]);
        
        if (layers.length === 0 || tilemaps.length === 0) {
            throw new Error('No layers or tilemaps found');
        }
        
        showLoading('Rendering...');
        await new Promise(resolve => setTimeout(resolve, 10));
        
        // Set up renderer
        renderer.setData(tiles, layers, tilemaps, levelWidth, levelHeight, [bgR, bgG, bgB]);
        renderer.setZoom(parseFloat(document.getElementById('zoom-slider').value));
        renderer.setShowGrid(document.getElementById('show-grid').checked);
        renderer.render();
        
        // Show UI
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('level-canvas').style.display = 'block';
        document.getElementById('viewport-toolbar').style.display = 'flex';
        document.getElementById('layer-panel').style.display = 'flex';
        
        // Update layer panel
        updateLayerPanel(layers);
        
        // Update status bar
        document.getElementById('status-level').textContent = 
            `${level.levelId} - ${level.name}`;
        document.getElementById('status-size').textContent = 
            `${levelWidth * 16}×${levelHeight * 16}`;
        document.getElementById('status-tiles').textContent = tiles.length.toString();
        document.getElementById('status-layers').textContent = layers.length.toString();
        
        // Update viewport info
        document.getElementById('viewport-info').textContent = 
            `${levelWidth * 16}×${levelHeight * 16} pixels`;
        
        hideLoading();
        
    } catch (err) {
        hideLoading();
        console.error('Error loading stage:', err);
        alert('Error loading stage: ' + err.message);
    }
}

function updateLayerPanel(layers) {
    const listEl = document.getElementById('layer-list');
    listEl.innerHTML = '';
    
    layers.forEach((layer, idx) => {
        const item = document.createElement('div');
        item.className = 'layer-item';
        
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.id = `layer-${idx}`;
        checkbox.checked = true;
        checkbox.addEventListener('change', () => {
            renderer.setLayerVisibility(idx, checkbox.checked);
        });
        
        const label = document.createElement('label');
        label.htmlFor = `layer-${idx}`;
        label.textContent = `Layer ${idx}`;
        
        const info = document.createElement('span');
        info.className = 'layer-info';
        info.textContent = `${layer.width}×${layer.height}`;
        
        item.appendChild(checkbox);
        item.appendChild(label);
        item.appendChild(info);
        listEl.appendChild(item);
    });
}

function startParallaxAnimation() {
    stopParallaxAnimation();
    
    function animate() {
        scrollOffset += 2;
        if (renderer) {
            renderer.render(scrollOffset);
        }
        animationFrame = requestAnimationFrame(animate);
    }
    
    animationFrame = requestAnimationFrame(animate);
}

function stopParallaxAnimation() {
    if (animationFrame) {
        cancelAnimationFrame(animationFrame);
        animationFrame = null;
    }
    scrollOffset = 0;
    if (renderer) {
        renderer.render(0);
    }
}

function showLoading(text) {
    document.getElementById('loading-text').textContent = text;
    document.getElementById('loading-overlay').classList.remove('hidden');
}

function hideLoading() {
    document.getElementById('loading-overlay').classList.add('hidden');
}

// Initialize on DOM ready
document.addEventListener('DOMContentLoaded', init);
</script>
